<html lang="en">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh;}
input,select,button,textarea{font-family:inherit;}
input,select,textarea{border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:15px;outline:none;width:100%;background:#fff;color:#0f172a;transition:border-color 0.15s,box-shadow 0.15s;}
input:focus,select:focus,textarea:focus{border-color:#16a34a;box-shadow:0 0 0 3px rgba(22,163,74,0.12);}
button{cursor:pointer;font-size:14px;}
:root{--g:#16a34a;--gl:#dcfce7;--gd:#14532d;--red:#dc2626;--redl:#fee2e2;--dark:#0f172a;--muted:#64748b;--border:#e2e8f0;--border2:#cbd5e1;}
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1.25rem;}
.gbtn{background:var(--g);color:#fff;border:none;border-radius:12px;padding:13px 20px;font-size:15px;font-weight:600;transition:opacity 0.15s,transform 0.1s;min-height:48px;}
.gbtn:active:not(:disabled){transform:scale(0.98);opacity:0.9;}
.gbtn:disabled{opacity:0.6;cursor:default;}
.dbtn{background:#f1f5f9;color:var(--dark);border:1px solid var(--border);border-radius:12px;padding:11px 18px;font-size:14px;font-weight:500;min-height:48px;transition:background 0.15s,transform 0.1s;}
.dbtn:active{background:#e2e8f0;transform:scale(0.98);}
.sec{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;}
#app{min-height:100vh;}
/* Topbar */
#topbar{background:#0f172a;padding:0 1.5rem;position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
#topbar-inner{max-width:1020px;margin:0 auto;display:flex;align-items:center;height:58px;gap:4px;}
.tlogo{width:32px;height:32px;border-radius:9px;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.tname{color:#fff;font-weight:700;font-size:16px;margin:0 16px 0 8px;white-space:nowrap;}
#desk-nav{display:flex;flex:1;gap:0;}
.dn-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,0.45);padding:0 14px;height:58px;font-size:14px;font-weight:400;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:color 0.15s;}
.dn-btn.active,.dn-btn:hover{color:#fff;}
.dn-btn.active{font-weight:600;border-bottom-color:var(--g);}
.signout{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);border-radius:8px;padding:6px 14px;font-size:13px;margin-left:8px;}
.signout:hover{background:rgba(255,255,255,0.18);}
/* Content */
#content{max-width:1020px;margin:0 auto;padding:1.5rem 1rem 5rem;}
/* Bottom nav mobile */
#bottomnav{position:fixed;bottom:0;left:0;right:0;background:#0f172a;display:flex;border-top:1px solid rgba(255,255,255,0.08);z-index:20;padding-bottom:env(safe-area-inset-bottom);}
.bn-btn{flex:1;background:transparent;border:none;color:rgba(255,255,255,0.4);padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:56px;font-size:10px;font-weight:400;transition:color 0.15s;}
.bn-btn.active{color:#4ade80;font-weight:600;}
.bn-btn i{font-size:21px;}
/* Drawer */
#drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:25;transition:opacity 0.2s;}
#drawer{position:absolute;bottom:64px;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:1rem 1rem calc(1rem + env(safe-area-inset-bottom));transition:transform 0.25s ease-out;transform:translateY(0);}
#drawer-bg.closing #drawer{transform:translateY(100%);}
.drawer-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 14px;}
.drawer-item{width:100%;display:flex;align-items:center;gap:14px;padding:14px 8px;background:transparent;border:none;border-bottom:1px solid var(--border);font-size:16px;color:var(--dark);text-align:left;min-height:56px;transition:background 0.15s;}
.drawer-item:active{background:#f8fafc;}
.drawer-item i{font-size:22px;color:var(--muted);}
.drawer-item.danger{color:var(--red);border-bottom:none;margin-top:4px;}
.drawer-item.danger i{color:var(--red);}
/* Login */
#login-screen{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1a2744 100%);display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.login-box{width:100%;max-width:420px;}
.login-logo{width:76px;height:76px;border-radius:22px;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 16px;box-shadow:0 8px 24px rgba(22,163,74,0.35);}
.login-title{color:#fff;font-size:28px;font-weight:700;text-align:center;letter-spacing:-0.01em;}
.login-sub{color:rgba(255,255,255,0.4);font-size:15px;text-align:center;margin-top:6px;}
.login-card{background:rgba(255,255,255,0.07);backdrop-filter:blur(12px);border-radius:20px;padding:1.75rem;border:1px solid rgba(255,255,255,0.12);margin-top:2.5rem;}
.tab-bar{display:flex;background:rgba(0,0,0,0.25);border-radius:12px;padding:4px;margin-bottom:22px;}
.tab-btn{flex:1;padding:11px;background:transparent;border:none;color:rgba(255,255,255,0.45);border-radius:10px;font-size:14px;font-weight:400;transition:all 0.2s;}
.tab-btn.active{background:rgba(255,255,255,0.15);color:#fff;font-weight:600;}
.dark-input{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:13px 15px;color:#fff;font-size:15px;outline:none;width:100%;}
.dark-input::placeholder{color:rgba(255,255,255,0.35);}
.dark-input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(22,163,74,0.2);}
.dark-input option{background:#1e293b;}
.login-err{font-size:13px;text-align:center;margin-top:4px;}
.login-gbtn{background:var(--g);border:none;border-radius:12px;color:#fff;padding:14px;font-size:16px;font-weight:600;width:100%;margin-top:4px;transition:opacity 0.15s;}
.login-gbtn:disabled{opacity:0.6;}
/* Stat pills */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px;}
.stat-pill{background:#fff;border:1px solid var(--border);border-radius:14px;padding:1rem 1.1rem;}
.stat-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;}
.stat-val{font-size:26px;font-weight:700;line-height:1;}
.stat-sub{font-size:12px;color:var(--muted);margin-top:3px;}
/* Next game hero */
.hero{border-radius:18px;padding:1.5rem;color:#fff;margin-bottom:16px;}
.hero-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.hero-title{font-size:22px;font-weight:700;margin-bottom:4px;}
.hero-sub{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:16px;}
.hero-btn{background:var(--g);border:none;border-radius:11px;color:#fff;padding:11px 20px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
/* Result badge */
.result-badge{padding:10px 18px;border-radius:24px;font-size:15px;font-weight:700;}
.w-badge{background:var(--gl);color:var(--gd);}
.l-badge{background:var(--redl);color:#991b1b;}
.d-badge{background:#f1f5f9;color:var(--muted);}
/* Game rows */
.game-row{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;min-height:64px;transition:border-color 0.15s;margin-bottom:10px;}
.game-row:hover{border-color:var(--border2);}
.game-bar{width:5px;border-radius:3px;flex-shrink:0;align-self:stretch;}
.wl-badge{min-width:32px;text-align:center;font-size:13px;font-weight:700;padding:5px 8px;border-radius:8px;}
/* Scoreboard */
.scoreboard{border-radius:20px;padding:1.5rem;color:#fff;margin-bottom:14px;}
.score-num{font-size:72px;font-weight:800;color:#fff;line-height:1;}
.score-ctrl{background:rgba(255,255,255,0.15);border:none;color:#fff;width:48px;height:48px;border-radius:12px;font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all 0.15s;user-select:none;}
.score-ctrl:hover{opacity:0.8;}
.score-ctrl:active{transform:scale(0.92);opacity:0.7;}
.score-ctrl.minus{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);}
.half-btn{flex:1;border:none;border-radius:12px;color:#fff;padding:13px;font-size:15px;font-weight:600;min-height:48px;transition:all 0.15s;user-select:none;}
.half-btn:active{transform:scale(0.97);}
.half-btn.start{background:var(--g);}
.half-btn.start:active{background:#15803d;}
.half-btn.end{background:var(--red);}
.half-btn.end:active{background:#b91c1c;}
.half-btn.ft{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.75);}
.half-btn.ft:active{background:rgba(255,255,255,0.15);}
.goal-pill{font-size:12px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);padding:4px 11px;border-radius:20px;}
.log-goal-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;padding:12px;font-size:15px;font-weight:500;width:100%;margin-top:12px;}
.log-goal-btn:hover{background:rgba(255,255,255,0.18);}
/* Player tracker cards */
.tracker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.tracker-card{border:1px solid var(--border);border-radius:14px;padding:12px 14px;cursor:pointer;background:#fff;transition:all 0.18s;user-select:none;}
.tracker-card:active{transform:scale(0.98);}
.tracker-card.on{border:2px solid var(--g);background:var(--gl);box-shadow:0 2px 8px rgba(22,163,74,0.12);}
.tracker-card.on:active{background:#d1fae5;}
.tracker-bar-bg{height:5px;border-radius:4px;margin-top:8px;}
.tracker-bar{height:5px;border-radius:4px;transition:width 1s linear;}
/* Avatar */
.avatar{border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid #fff;}
.avatar-initials{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;border:2px solid #fff;letter-spacing:0.02em;}
/* Roster */
.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.roster-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;min-height:72px;}
/* Goal sheet */
#goal-sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:50;align-items:flex-end;justify-content:center;transition:opacity 0.2s;}
#goal-sheet{background:#fff;border-radius:22px 22px 0 0;padding:1.5rem 1.5rem calc(1.5rem + env(safe-area-inset-bottom));width:100%;max-width:600px;max-height:75vh;overflow-y:auto;-webkit-overflow-scrolling:touch;transition:transform 0.3s ease-out;}
.goal-player-btn{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#f8fafc;border:1px solid var(--border);border-radius:14px;width:100%;text-align:left;margin-bottom:8px;transition:all 0.15s;min-height:60px;user-select:none;}
.goal-player-btn:hover{background:var(--gl);border-color:var(--g);}
.goal-player-btn:active{background:var(--gl);border-color:var(--g);transform:scale(0.98);}
/* Pitch */
.pitch{background:#2d7a3c;border-radius:20px;overflow:visible;position:relative;}
.pitch-line{position:absolute;background:rgba(255,255,255,0.25);}
.pitch-circle{position:absolute;border:1px solid rgba(255,255,255,0.2);border-radius:50%;}
.pos-node{position:absolute;text-align:center;z-index:2;user-select:none;transform:translate(-50%,-50%);}
.pos-circle{width:50px;height:50px;border-radius:50%;border:2px dashed rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center;cursor:pointer;margin:0 auto;background:rgba(255,255,255,0.08);}
.pos-circle.filled{border:2px solid transparent;background:transparent;}
.pos-label-text{color:#fff;font-size:12px;margin-top:3px;text-shadow:0 1px 4px rgba(0,0,0,0.8);max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.lb-row:last-child{border-bottom:none;}
/* Settings checkbox */
.check-row{display:flex;align-items:center;gap:14px;padding:14px;background:#f8fafc;border-radius:12px;border:1px solid var(--border);cursor:pointer;}
.custom-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.custom-check.checked{background:var(--g);border-color:var(--g);}
/* Responsive */
@media(min-width:768px){
  #bottomnav{display:none;}
  #content{padding-bottom:2rem;}
  .score-num{font-size:72px;}
  #drawer-bg{display:none!important;}
}
@media(max-width:767px){
  #desk-nav .dn-btn span{display:none;}
  .signout span{display:none;}
  #topbar{display:none;}
  .tracker-grid{grid-template-columns:1fr 1fr;}
  .roster-grid{grid-template-columns:1fr;}
  .score-num{font-size:56px;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .hero-title{font-size:20px;}
  .login-logo{width:64px;height:64px;font-size:32px;}
  .login-title{font-size:24px;}
}
@media(max-width:640px){
  .stat-grid{gap:10px;}
  .stat-pill{padding:0.875rem 1rem;}
  .stat-val{font-size:22px;}
  #content{padding:1rem 0.875rem 5rem;}
  .card{padding:1rem;}
  .hero{padding:1.25rem;}
  .scoreboard{padding:1.25rem;}
}
/* Better lineup on mobile */
@media(max-width:767px){
  .pitch{padding-bottom:140%!important;}
}
/* Lineup responsive layout */
@media(max-width:900px){
  div[style*="grid-template-columns:minmax(0,1fr) 200px"]{
    grid-template-columns:1fr!important;
  }
  div[style*="grid-template-columns:minmax(0,1fr) 200px"] > div:last-child{
    order:-1;
  }
}
</style>

  if(STATE.tickInterval)clearInterval(STATE.tickInterval);
  if(STATE.view==="live"){STATE.tickInterval=setInterval(()=>{if(STATE.view==="live")rerenderLiveTimers();},1000);}
}

function renderView(){
  switch(STATE.view){
    case"dashboard":return renderDashboard();
    case"live":return renderLive();
    case"history":return renderHistory();
    case"roster":return renderRoster();
    case"lineup":return renderLineup();
    case"settings":return renderSettings();
    default:return"";
  }
}

function renderLogin(){
  return`<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">⚽</div>
    <div class="login-title">Soccer Hub</div>
    <div class="login-sub">Team management platform</div>
    <div class="login-card">
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign in</button>
        <button class="tab-btn" id="tab-create" onclick="switchTab('create')">New team</button>
      </div>
      <div id="login-form">
        <div style="display:flex;flex-direction:column;gap:12px">
          <input class="dark-input" id="l-team" placeholder="Team name"/>
          <select class="dark-input" id="l-role"><option value="coach">Coach</option><option value="player">Player / Public</option></select>
          <input class="dark-input" type="password" id="l-pass" placeholder="Password"/>
          <div id="login-err" class="login-err" style="color:#fca5a5"></div>
          <button class="login-gbtn" id="login-btn" onclick="doLogin()">Sign in</button>
        </div>
      </div>
      <div id="create-form" style="display:none">
        <div style="display:flex;flex-direction:column;gap:12px">
          <input class="dark-input" id="c-name" placeholder="Team name"/>
          <input class="dark-input" type="password" id="c-coach" placeholder="Coach password"/>
          <input class="dark-input" type="password" id="c-player" placeholder="Player password (optional)"/>
          <div id="create-err" class="login-err" style="color:#fca5a5"></div>
          <button class="login-gbtn" id="create-btn" onclick="doCreate()">Create team</button>
        </div>
      </div>
    </div>
  </div>
</div>`;
}
function bindLogin(){
  el("l-pass")?.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
}
function switchTab(t){
  el("tab-login").classList.toggle("active",t==="login");
  el("tab-create").classList.toggle("active",t==="create");
  el("login-form").style.display=t==="login"?"block":"none";
  el("create-form").style.display=t==="create"?"block":"none";
}
async function doLogin(){
  const name=el("l-team").value.trim(),pass=el("l-pass").value,role=el("l-role").value;
  if(!name||!pass){el("login-err").textContent="Fill in all fields.";return;}
  el("login-btn").disabled=true;el("login-btn").textContent="Signing in...";
  try{
    const{data,error}=await sb.from("teams").select("*").ilike("name",name).single();
    if(error||!data){el("login-err").textContent="Team not found.";return;}
    if(role==="coach"&&pass===data.coach_pass){STATE.role="coach";STATE.team=data;}
    else if(role==="player"&&pass===data.player_pass){STATE.role="player";STATE.team=data;}
    else{el("login-err").textContent="Incorrect password.";return;}
    STATE.lineup=data.lineup||{};STATE.activeFormation=data.active_formation||0;
    await refreshData();render();
  }catch(e){el("login-err").textContent="Connection error: "+e.message;}
  finally{if(el("login-btn")){el("login-btn").disabled=false;el("login-btn").textContent="Sign in";}}
}
async function doCreate(){
  const name=el("c-name").value.trim(),coach=el("c-coach").value,player=el("c-player").value;
  if(!name||!coach){el("create-err").textContent="Name and coach password required.";return;}
  el("create-btn").disabled=true;el("create-btn").textContent="Creating...";
  try{
    const{data:existing}=await sb.from("teams").select("id").ilike("name",name);
    if(existing?.length){el("create-err").textContent="Team name already taken.";return;}
    const{data:t,error}=await sb.from("teams").insert({name,coach_pass:coach,player_pass:player||"",formations:DEFAULT_FORMATIONS,lineup:{},active_formation:0,leaderboard_public:false}).select().single();
    if(error)throw new Error(error.message);
    const nm=name.toLowerCase();
    if(nm.includes("spiderz")||nm.includes("misumi")||nm.includes("spider")){
      for(const g of SPIDERZ_GAMES)await sb.from("games").insert({...g,team_id:t.id});
    }
    el("create-err").style.color="#4ade80";el("create-err").textContent="Team created! Sign in below.";
    switchTab("login");el("l-team").value=name;
  }catch(e){el("create-err").textContent="Error: "+e.message;}
  finally{if(el("create-btn")){el("create-btn").disabled=false;el("create-btn").textContent="Create team";}}
}

// ── Data ──────────────────────────────────────────────────────────────────────
async function refreshData(){
  const tid=STATE.team.id;
  const[{data:p},{data:g}]=await Promise.all([
    sb.from("players").select("*").eq("team_id",tid).order("created_at"),
    sb.from("games").select("*").eq("team_id",tid).order("date")
  ]);
  STATE.players=p||[];STATE.games=g||[];
}
async function refreshTeam(){
  const{data}=await sb.from("teams").select("*").eq("id",STATE.team.id).single();
  if(data)STATE.team=data;
}
async function updateGame(id,patch){
  STATE.games=STATE.games.map(g=>g.id===id?{...g,...patch}:g);
  await sb.from("games").update(patch).eq("id",id);
}

// ── Dashboard ─────────────────────────────────────────────────────────────────

  </div>

  ${upcoming?`<div class="hero" style="background:linear-gradient(135deg,#0f172a 0%,#1a3a2a 100%)">
    <div class="hero-label">Next game</div>
    <div class="hero-title">vs ${upcoming.opponent||"TBD"}</div>
    <div class="hero-sub">${fmtDate(upcoming.date)}${upcoming.time?` · ${upcoming.time}`:""}${upcoming.venue?` · ${upcoming.venue}`:""}</div>
    ${STATE.role==="coach"?`<button class="hero-btn" onclick="setView('live')"><i class="ti ti-player-play"></i>Open live tracker</button>`:""}
  </div>`:""}

  ${last?`<div class="card" style="margin-bottom:16px">
    <div class="sec">Last result</div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="flex:1">
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px">vs ${last.opponent||"?"} · ${fmtDate(last.date)}</div>
        <div style="font-size:38px;font-weight:800;letter-spacing:-0.02em;line-height:1">${last.home_score} <span style="color:var(--muted);font-size:28px;font-weight:400">–</span> ${last.away_score}</div>
      </div>
      <div class="result-badge ${last.home_score>last.away_score?"w-badge":last.home_score<last.away_score?"l-badge":"d-badge"}">${last.home_score>last.away_score?"Win":last.home_score<last.away_score?"Loss":"Draw"}</div>
    </div>
    ${(last.goals||[]).length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">${last.goals.map(g=>{const p=STATE.players.find(pl=>pl.id===g.player_id);return`<span style="font-size:12px;background:#f1f5f9;padding:4px 10px;border-radius:20px;font-weight:500">⚽ ${p?.name||g.player_name||"?"} ${g.minute}'</span>`;}).join("")}</div>`:""}

      <div class="sec" style="margin:0">Top scorers</div>
      ${!STATE.team.leaderboard_public&&STATE.role==="coach"?`<span class="pill-badge" style="background:var(--gl);color:var(--gd)">Coach only</span>`:""}
    </div>
    ${board.slice(0,6).map((p,i)=>`<div class="lb-row">
      <span style="width:24px;font-size:14px;font-weight:700;text-align:center">${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</span>
      ${avatarHTML(p,36)}
      <span style="flex:1;font-size:15px;font-weight:600">${p.name}</span>
      <span style="font-size:16px;font-weight:700;color:var(--g)">${p.goals}</span>
      <span style="font-size:12px;color:var(--muted)">⚽</span>
    </div>`).join("")}

    const active=STATE.games.find(g=>!g.finished);
    return`

        <div class="hero-label">Game in progress</div>
        <div class="hero-title">vs ${active.opponent||"?"}</div>
        <div class="hero-sub">${fmtDate(active.date)}${active.time?` · ${active.time}`:""}</div>

      </div>`:""}
      <div class="card">
        <div style="font-size:14px;font-weight:600;margin-bottom:14px">Start new game</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
          <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;font-weight:500">Opponent</label><input id="ng-opp" placeholder="Team name" value=""/></div>

          <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;font-weight:500">Date</label><input id="ng-date" type="date" value="${todayStr()}"/></div>
          <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;font-weight:500">Kickoff time</label><input id="ng-time" type="time" value="${nowTime()}"/></div>
        </div>

  return renderGameView(game);

function renderGameView(game){
  const now=Date.now();
  const halfActive=!!(game.half_started_at&&!game.finished);
  const elapsed=halfActive?now-game.half_started_at:0;
  const halfLabel=game.finished?"Full time":game.half===0?"Pre-match":`Half ${game.half} · ${fmt(elapsed)}`;

  let halfBtns="";
  if(!game.finished){
    if(game.half===0)halfBtns+=`<button class="half-btn start" onclick="startHalf()">Start 1st half</button>`;
    if(game.half===1&&halfActive)halfBtns+=`<button class="half-btn end" onclick="endHalf()">End 1st half</button>`;
    if(game.half===1&&!halfActive)halfBtns+=`<button class="half-btn start" onclick="startHalf()">Start 2nd half</button>`;
    if(game.half===2&&halfActive)halfBtns+=`<button class="half-btn end" onclick="endHalf()">End 2nd half</button>`;
    if(game.half>=1)halfBtns+=`<button class="half-btn ft" onclick="fullTime()">Full time</button>`;
  }

  const goalPills=(game.goals||[]).map(g=>{const p=STATE.players.find(pl=>pl.id===g.player_id);return`<span class="goal-pill">⚽ ${p?.name||g.player_name||"?"} ${g.minute}'</span>`;}).join("");

  const trackerCards=STATE.players.map(p=>{
    const ms=getPlayerMs(game,p.id,now);
    const on=!!(game.player_on_field?.[p.id]);
    const pct=Math.min(100,Math.round(ms/1500000*100));
    const barColor=pct>85?"#dc2626":pct>60?"#d97706":"#16a34a";
    return`<div class="tracker-card${on?" on":""}" onclick="togglePlayer('${p.id}')">
      <div style="display:flex;align-items:center;gap:10px">
        ${avatarHTML(p,38)}
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600;color:${on?"#14532d":"#0f172a"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
          <div style="font-size:11px;color:${on?"#16a34a":"#64748b"};font-weight:500;margin-top:1px">${on?"On field ●":"Bench"}</div>
        </div>
        <div id="pt-${p.id}" style="font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;color:${on?"#14532d":"#0f172a"}">${fmt(ms)}</div>
      </div>
      <div class="tracker-bar-bg" style="background:${on?"rgba(22,163,74,0.15)":"#f1f5f9"}">
        <div class="tracker-bar" style="width:${pct}%;background:${barColor}"></div>
      </div>
    </div>`;
  }).join("");

  return`
  <div class="scoreboard" style="background:linear-gradient(150deg,#0f172a 0%,#0f2d1a 100%)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px">
      <div style="font-size:12px;color:rgba(255,255,255,0.4)">${game.date}${game.time?` · ${game.time}`:""}${game.venue?` · ${game.venue}`:""}</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.5);font-weight:500" id="half-label">${halfLabel}</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin:20px 0">
      <div style="flex:1;text-align:center">
        <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${STATE.team.name}</div>
        <div class="score-num" id="home-score">${game.home_score}</div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:14px">
          <button class="score-ctrl" onclick="adjScore('home',1)">+</button>
          <button class="score-ctrl minus" onclick="adjScore('home',-1)">−</button>
        </div>
      </div>
      <div style="font-size:36px;color:rgba(255,255,255,0.2);font-weight:300;padding:0 4px">–</div>
      <div style="flex:1;text-align:center">
        <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${game.opponent||"Opponent"}</div>
        <div class="score-num" id="away-score">${game.away_score}</div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:14px">
          <button class="score-ctrl" onclick="adjScore('away',1)">+</button>
          <button class="score-ctrl minus" onclick="adjScore('away',-1)">−</button>
        </div>
      </div>
    </div>
    ${goalPills?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;justify-content:center">${goalPills}</div>`:""}
    <div style="display:flex;gap:10px;flex-wrap:wrap">${halfBtns}</div>
    ${!game.finished?`<button class="log-goal-btn" onclick="openGoalSheet()">⚽ Log goal — select scorer</button>`:""}
  </div>

  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:13px;font-weight:600">Playtime tracker</div>
      ${halfActive?`<span style="font-size:12px;color:var(--g);font-weight:600;background:var(--gl);padding:4px 10px;border-radius:20px">Tap to sub in/out</span>`:""}
    </div>
    <div class="tracker-grid" id="tracker-grid">${trackerCards}</div>
    ${STATE.players.length===0?`<p style="color:var(--muted);font-size:14px;text-align:center;padding:1rem">Add players in Roster first.</p>`:""}
  </div>

  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:8px">Game film link</div>
    <input placeholder="Paste video URL" value="${game.film_link||""}" oninput="updateFilmLink(this.value)"/>
  </div>`;
}

function rerenderLiveTimers(){
  const game=STATE.games.find(g=>g.id===STATE.gameId);
  if(!game||!game.half_started_at||game.finished)return;
  const now=Date.now();
  const elapsed=now-game.half_started_at;
  const hl=el("half-label");
  if(hl)hl.textContent=`Half ${game.half} · ${fmt(elapsed)}`;
  STATE.players.forEach(p=>{
    const ms=getPlayerMs(game,p.id,now);
    const ptEl=el(`pt-${p.id}`);
    if(ptEl)ptEl.textContent=fmt(ms);
  });
}

function getPlayerMs(game,pid,now){
  let ms=game.player_times?.[pid]||0;
  if(game.player_on_field?.[pid]&&game.half_started_at)ms+=now-game.player_on_field[pid];
  return ms;
}

function bindView(){
  // goal sheet close
  const bg=el("goal-sheet-bg");
  if(bg)bg.addEventListener("click",e=>{if(e.target===bg)closeGoalSheet();});
}

async function startGame(){
  const btn=el("start-btn");
  if(btn){btn.disabled=true;btn.textContent="Creating...";}
  try{
    const opp=el("ng-opp")?.value||"";
    const venue=el("ng-venue")?.value||"";
    const date=el("ng-date")?.value||todayStr();
    const time=el("ng-time")?.value||"";
    const{data,error}=await sb.from("games").insert({team_id:STATE.team.id,opponent:opp,venue,date,time,home_score:0,away_score:0,goals:[],half:0,half_started_at:null,player_times:{},player_on_field:{},finished:false,film_link:""}).select().single();
    if(error)throw new Error(error.message);
    STATE.games.push(data);STATE.gameId=data.id;render();
  }catch(e){alert("Error: "+e.message);if(btn){btn.disabled=false;btn.textContent="Start game";}}
}
function resumeGame(id){STATE.gameId=id;render();}

function getGame(){return STATE.games.find(g=>g.id===STATE.gameId);}

async function adjScore(side,delta){
  const game=getGame();if(!game)return;
  const key=side==="home"?"home_score":"away_score";
  const val=Math.max(0,(game[key]||0)+delta);
  await updateGame(game.id,{[key]:val});
  const el2=el(side+"-score");if(el2)el2.textContent=val;
}

async function startHalf(){
  const game=getGame();if(!game)return;
  const half=game.half+1;
  const now=Date.now();
  await updateGame(game.id,{half,half_started_at:now});
  render();
}
async function endHalf(){
  const game=getGame();if(!game)return;
  const now=Date.now();
  const pt=computeTimes(game,now);
  const pof=clearField(game.player_on_field);
  await updateGame(game.id,{half_started_at:null,player_times:pt,player_on_field:pof});
  render();
}
async function fullTime(){
  const game=getGame();if(!game)return;
  const now=Date.now();
  const pt=computeTimes(game,now);
  const pof=clearField(game.player_on_field);
  await updateGame(game.id,{finished:true,half_started_at:null,player_times:pt,player_on_field:pof});
  render();
}
function computeTimes(game,now){
  const pt={...(game.player_times||{})};
  Object.keys(game.player_on_field||{}).forEach(pid=>{if(game.player_on_field[pid])pt[pid]=(pt[pid]||0)+(now-game.player_on_field[pid]);});
  return pt;
}
function clearField(pof){const o={};Object.keys(pof||{}).forEach(k=>o[k]=null);return o;}

async function togglePlayer(pid){
  const game=getGame();if(!game||!game.half_started_at||game.finished)return;
  const now=Date.now();
  const pof={...(game.player_on_field||{})};
  const pt={...(game.player_times||{})};
  if(pof[pid]){pt[pid]=(pt[pid]||0)+(now-pof[pid]);pof[pid]=null;}
  else{pof[pid]=now;}
  await updateGame(game.id,{player_on_field:pof,player_times:pt});
  render();
}

async function updateFilmLink(val){
  const game=getGame();if(!game)return;
  clearTimeout(window._filmTimer);
  window._filmTimer=setTimeout(()=>updateGame(game.id,{film_link:val}),800);
}

function openGoalSheet(){
  const game=getGame();if(!game)return;
  const sheet=el("goal-sheet");
  const bg=el("goal-sheet-bg");
  if(!sheet||!bg)return;
  sheet.innerHTML=`
    <div style="width:36px;height:4px;border-radius:2px;background:#e2e8f0;margin:0 auto 16px"></div>
    <div style="font-size:18px;font-weight:700;color:#0f172a;margin-bottom:16px">Who scored? ⚽</div>
    <div>${STATE.players.map(p=>`<button class="goal-player-btn" onclick="logGoal('${p.id}','${p.name.replace(/'/g,"\\'")}')">
      ${avatarHTML(p,42)}<span style="font-size:16px;font-weight:600;color:#0f172a">${p.name}</span>
    </button>`).join("")}</div>
    <button onclick="closeGoalSheet()" style="margin-top:14px;width:100%;background:#f1f5f9;border:none;border-radius:12px;padding:13px;font-size:15px;color:#64748b;font-weight:500">Cancel</button>
  `;
  bg.style.display="flex";
}
function closeGoalSheet(){const bg=el("goal-sheet-bg");if(bg)bg.style.display="none";}
async function logGoal(pid,pname){
  const game=getGame();if(!game)return;
  const now=Date.now();
  const min=game.half_started_at?Math.floor((now-game.half_started_at)/60000)+1+(game.half>1?25:0):1;
  const goals=[...(game.goals||[]),{player_id:pid,player_name:pname,minute:min,half:game.half||1}];
  const home_score=game.home_score+1;
  await updateGame(game.id,{goals,home_score});
  closeGoalSheet();render();
}

// ── History ───────────────────────────────────────────────────────────────────
let _histSel=null;
function renderHistory(){
  if(_histSel){
    const game=STATE.games.find(g=>g.id===_histSel);
    if(game)return renderHistoryDetail(game);
  }
  const finished=[...STATE.games].filter(g=>g.finished).sort((a,b)=>b.date?.localeCompare(a.date||"")||0);
  const upcoming=[...STATE.games].filter(g=>!g.finished).sort((a,b)=>a.date?.localeCompare(b.date||"")||0);
  return`
  <div style="font-size:20px;font-weight:700;margin-bottom:1.25rem">Schedule & results</div>
  ${upcoming.length?`<div class="sec">Upcoming</div>${upcoming.map(gameRowHTML).join("")}`:""}
  ${finished.length?`<div class="sec" style="margin-top:${upcoming.length?16:0}px">Results</div>${finished.map(gameRowHTML).join("")}`:""}
  ${!STATE.games.length?`<p style="color:var(--muted);text-align:center;padding:2rem">No games yet.</p>`:""}`;
}
function gameRowHTML(g){
  const W=g.home_score>g.away_score,L=g.home_score<g.away_score;
  const barColor=g.finished?(W?"#16a34a":L?"#dc2626":"#cbd5e1"):"#93c5fd";
  return`<div class="game-row" onclick="selectGame('${g.id}')">
    <div class="game-bar" style="height:50px;background:${barColor}"></div>
    <div style="flex:1;min-width:0">
      <div style="font-size:15px;font-weight:600">vs ${g.opponent||"TBD"}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px">${fmtDate(g.date)}${g.time?` · ${g.time}`:""}${g.venue?` · ${g.venue}`:""}</div>
    </div>
    ${g.finished?`<div style="font-size:20px;font-weight:700">${g.home_score} – ${g.away_score}</div>
    <div class="wl-badge ${W?"w-badge":L?"l-badge":"d-badge"}">${W?"W":L?"L":"D"}</div>`
    :`<span class="pill-badge" style="background:#dbeafe;color:#1d4ed8">Upcoming</span>`}
    <i class="ti ti-chevron-right" style="font-size:18px;color:#cbd5e1"></i>
  </div>`;
}
function selectGame(id){_histSel=id;renderHistoryView();}
function renderHistoryView(){const c=el("content");if(c)c.innerHTML=renderHistory();}
function renderHistoryDetail(game){
  const W=game.home_score>game.away_score,L=game.home_score<game.away_score;
  const goalPills=(game.goals||[]).map(g=>{const p=STATE.players.find(pl=>pl.id===g.player_id);return`<span style="font-size:13px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);padding:5px 13px;border-radius:20px">⚽ ${p?.name||g.player_name||"?"} ${g.minute}'</span>`;}).join("");
  const hasTimes=Object.keys(game.player_times||{}).length>0;
  return`
  <button onclick="_histSel=null;renderHistoryView()" style="background:none;border:none;color:var(--muted);font-size:15px;display:flex;align-items:center;gap:6px;min-height:44px;margin-bottom:12px;cursor:pointer"><i class="ti ti-arrow-left" style="font-size:20px"></i>Back</button>
  <div style="background:linear-gradient(150deg,#0f172a,#0f2d1a);border-radius:20px;padding:1.75rem;color:#fff;text-align:center;margin-bottom:14px">
    <div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:3px">${fmtDate(game.date)}${game.time?` · ${game.time}`:""}</div>
    ${game.venue?`<div style="font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:8px">${game.venue}</div>`:""}
    <div style="font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:12px;font-weight:500">vs ${game.opponent||"?"}</div>
    ${game.finished?`<div style="font-size:64px;font-weight:800;line-height:1;letter-spacing:-0.02em">${game.home_score} <span style="color:rgba(255,255,255,0.25);font-size:44px;font-weight:300">–</span> ${game.away_score}</div>
    <div style="margin-top:12px"><span class="result-badge ${W?"w-badge":L?"l-badge":"d-badge"}">${W?"Win":L?"Loss":"Draw"}</span></div>`
    :`<div style="font-size:20px;font-weight:600;color:rgba(255,255,255,0.6);margin-top:8px">Upcoming</div>`}
    ${goalPills?`<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:16px">${goalPills}</div>`:""}
  </div>
  ${STATE.role==="coach"&&hasTimes?`<div class="card" style="margin-bottom:14px">
    <div style="font-size:13px;font-weight:600;margin-bottom:14px">Playtime</div>
    ${STATE.players.map(p=>{const ms=game.player_times?.[p.id]||0,pct=Math.min(100,Math.round(ms/1500000*100));return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      ${avatarHTML(p,36)}
      <div style="flex:1">
        <div style="font-size:14px;font-weight:600;margin-bottom:5px">${p.name}</div>
        <div style="height:6px;background:#f1f5f9;border-radius:6px"><div style="height:6px;width:${pct}%;background:var(--g);border-radius:6px"></div></div>
      </div>
      <span style="font-size:14px;font-weight:600;color:var(--muted);min-width:48px;text-align:right">${fmt(ms)}</span>
    </div>`;}).join("")}
  </div>`:""}
  ${game.film_link?`<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:8px">Game film</div><a href="${game.film_link}" target="_blank" style="color:#2563eb;font-size:15px;display:flex;align-items:center;gap:6px"><i class="ti ti-external-link" style="font-size:17px"></i>Watch film</a></div>`:""}`;
}

// ── Roster ────────────────────────────────────────────────────────────────────

let _pendingPhoto=null;
function showAddPlayer(){el("add-player-form").style.display="block";}
function handlePhotoSelect(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();r.onload=e=>{_pendingPhoto=e.target.result;el("photo-label").textContent="Photo ✓";};r.readAsDataURL(file);
}
async function addPlayer(){
  const name=el("np-name")?.value?.trim();if(!name)return;
  const btn=document.querySelector("#add-player-form .gbtn");if(btn){btn.disabled=true;btn.textContent="Adding...";}
  try{
    const{data,error}=await sb.from("players").insert({team_id:STATE.team.id,name,photo:_pendingPhoto||null}).select().single();
    if(error)throw new Error(error.message);
    STATE.players.push(data);_pendingPhoto=null;
    render();
  }catch(e){alert("Error: "+e.message);if(btn){btn.disabled=false;btn.textContent="Add player";}}
}
async function removePlayer(id){
  if(!confirm("Remove this player?"))return;
  await sb.from("players").delete().eq("id",id);
  STATE.players=STATE.players.filter(p=>p.id!==id);render();
}

// ── Lineup ────────────────────────────────────────────────────────────────────
let _drag=null,_dragPosId=null;
function renderLineup(){
  if(STATE.role!=="coach")return`<div style="padding:2rem;text-align:center;color:var(--muted)">Coach only.</div>`;
  const formations=STATE.team.formations||DEFAULT_FORMATIONS;
  const formation=formations[STATE.activeFormation]||formations[0];
  const assignedIds=Object.values(STATE.lineup).map(v=>v?.id).filter(Boolean);
  const bench=STATE.players.filter(p=>!assignedIds.includes(p.id));

  const formationTabs=formations.map((f,i)=>`<button onclick="switchFormation(${i})" style="padding:8px 16px;border-radius:20px;font-size:14px;border:1px solid ${i===STATE.activeFormation?"#16a34a":"#e2e8f0"};background:${i===STATE.activeFormation?"#dcfce7":"#fff"};color:${i===STATE.activeFormation?"#14532d":"#0f172a"};cursor:pointer;font-weight:${i===STATE.activeFormation?600:400};white-space:nowrap;min-height:38px">${f.name}</button>`).join("");

  const pitchNodes=formation.positions.map(pos=>{
    const p=STATE.lineup[pos.id];
    if(STATE.editMode){
      return`<div class="pos-node" style="left:${pos.x}%;top:${pos.y}%" draggable="true" ondragstart="dragPos('${pos.id}')" ondragend="_dragPosId=null">
        <div style="width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px dashed rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;margin:0 auto;cursor:grab">
          <select onchange="updatePosLabel('${pos.id}',this.value)" onclick="event.stopPropagation()" style="background:transparent;border:none;color:#fff;font-size:10px;font-weight:700;text-align:center;width:40px;outline:none">
            ${POS_LABELS.map(l=>`<option value="${l}" ${l===pos.label?"selected":""} style="background:#1e3a2a">${l}</option>`).join("")}
          </select>
        </div>
        <button onclick="removePos('${pos.id}')" style="background:#dc2626;border:none;border-radius:50%;color:#fff;width:20px;height:20px;font-size:13px;cursor:pointer;margin-top:2px;line-height:1">×</button>
      </div>`;
    }
    return`<div class="pos-node" style="left:${pos.x}%;top:${pos.y}%">
      <div class="pos-circle${p?" filled":""}" ondragover="event.preventDefault()" ondrop="dropOnPos('${pos.id}')" onclick="clickPos('${pos.id}')">
        ${p?avatarHTML(p,50):`<span style="color:rgba(255,255,255,0.8);font-size:11px;font-weight:700">${pos.label}</span>`}
      </div>
      ${p?`<div class="pos-label-text">${p.name.split(" ")[0]}</div>`:""}
    </div>`;
  }).join("");

  const benchHTML=bench.map(p=>`<div draggable="true" ondragstart="dragPlayer(event,'${p.id}')" ondragend="_drag=null" style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;cursor:grab;min-height:52px;margin-bottom:8px">
    ${avatarHTML(p,32)}<span style="font-size:14px;font-weight:500">${p.name}</span>
  </div>`).join("");

  return`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="font-size:20px;font-weight:700">Lineup</div>
    <div style="display:flex;gap:8px">
      <button onclick="toggleEditMode()" style="background:${STATE.editMode?"#dcfce7":"#f1f5f9"};border:1px solid ${STATE.editMode?"#16a34a":"#e2e8f0"};color:${STATE.editMode?"#14532d":"#0f172a"};border-radius:10px;padding:9px 16px;font-size:14px;font-weight:${STATE.editMode?600:400};min-height:42px">${STATE.editMode?"Done editing":"Edit layout"}</button>
      <button class="gbtn" style="width:auto;min-height:42px;padding:9px 18px" onclick="saveLineup()">Save</button>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;flex-wrap:wrap">${formationTabs}
    ${(formations.length<6&&!STATE.editMode)?`<div style="display:flex;gap:6px;align-items:center">
      <input id="new-form-name" placeholder="New name" style="width:120px;font-size:14px;padding:8px 12px"/>
      <button onclick="addFormation()" style="background:var(--g);border:none;border-radius:10px;color:#fff;padding:8px 14px;font-size:14px;font-weight:600;min-height:38px">+</button>
    </div>`:""}
  </div>
  <div style="display:grid;grid-template-columns:minmax(0,1fr) 200px;gap:16px;align-items:start">
    <div class="pitch" style="padding-bottom:135%" id="pitch-container" ondragover="event.preventDefault()" ondrop="dropOnPitch(event)">
      <div style="position:absolute;inset:0;border-radius:20px;overflow:hidden">
        <div style="position:absolute;left:10%;right:10%;top:47%;height:1px;background:rgba(255,255,255,0.25)"></div>
        <div style="position:absolute;left:10%;right:10%;top:9%;height:1px;background:rgba(255,255,255,0.2)"></div>
        <div style="position:absolute;left:10%;right:10%;bottom:9%;height:1px;background:rgba(255,255,255,0.2)"></div>
        <div style="position:absolute;left:25%;right:25%;top:44%;bottom:52%;border:1px solid rgba(255,255,255,0.2);border-radius:50%"></div>
        <div style="position:absolute;left:30%;right:30%;top:7%;bottom:87%;border:1px solid rgba(255,255,255,0.15)"></div>
        <div style="position:absolute;left:30%;right:30%;top:87%;bottom:7%;border:1px solid rgba(255,255,255,0.15)"></div>
      </div>
      ${pitchNodes}
    </div>
    <div>
      ${STATE.editMode?`<div class="card">
        <div style="font-size:13px;font-weight:600;margin-bottom:10px">Edit mode</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Drag circles to reposition. Use dropdowns to change labels.</p>
        <button onclick="addPos()" style="background:var(--g);border:none;border-radius:10px;color:#fff;padding:11px;width:100%;font-size:14px;font-weight:600">+ Add position</button>
      </div>`:`<div class="card">
        <div style="font-size:13px;font-weight:600;margin-bottom:10px">Bench</div>
        ${benchHTML||`<p style="font-size:13px;color:var(--muted);text-align:center;padding:0.5rem">All placed.</p>`}
        <p style="font-size:11px;color:var(--muted);margin-top:8px">Drag players to positions. Tap placed player to remove.</p>
      </div>`}
    </div>
  </div>`;
}

function dragPlayer(e,pid){_drag=STATE.players.find(p=>p.id===pid);}
function dragPos(pid){_dragPosId=pid;}
function dropOnPos(posId){
  if(!_drag)return;
  const l={...STATE.lineup};l[posId]=_drag;STATE.lineup=l;_drag=null;renderLineupView();
}
function clickPos(posId){
  if(STATE.lineup[posId]){const l={...STATE.lineup};delete l[posId];STATE.lineup=l;renderLineupView();}
}
function dropOnPitch(e){
  if(!_dragPosId)return;
  const pitch=el("pitch-container");if(!pitch)return;
  const rect=pitch.getBoundingClientRect();
  const x=Math.round(Math.max(5,Math.min(95,((e.clientX-rect.left)/rect.width)*100)));
  const y=Math.round(Math.max(5,Math.min(95,((e.clientY-rect.top)/rect.height)*100)));
  const formations=STATE.team.formations||DEFAULT_FORMATIONS;
  const updated=formations.map((f,i)=>i===STATE.activeFormation?{...f,positions:f.positions.map(p=>p.id===_dragPosId?{...p,x,y}:p)}:f);
  STATE.team={...STATE.team,formations:updated};_dragPosId=null;renderLineupView();
}
function renderLineupView(){const c=el("content");if(c)c.innerHTML=renderLineup();}
function toggleEditMode(){STATE.editMode=!STATE.editMode;renderLineupView();}
function switchFormation(i){STATE.activeFormation=i;STATE.lineup={};renderLineupView();}
function addPos(){
  const formations=STATE.team.formations||DEFAULT_FORMATIONS;
  const pos={id:`p${Date.now()}`,label:"CM",x:50,y:50};
  const updated=formations.map((f,i)=>i===STATE.activeFormation?{...f,positions:[...f.positions,pos]}:f);
  STATE.team={...STATE.team,formations:updated};renderLineupView();
}
function removePos(pid){
  const formations=STATE.team.formations||DEFAULT_FORMATIONS;
  const updated=formations.map((f,i)=>i===STATE.activeFormation?{...f,positions:f.positions.filter(p=>p.id!==pid)}:f);
  const l={...STATE.lineup};delete l[pid];STATE.lineup=l;STATE.team={...STATE.team,formations:updated};renderLineupView();
}
function updatePosLabel(pid,label){
  const formations=STATE.team.formations||DEFAULT_FORMATIONS;
  const updated=formations.map((f,i)=>i===STATE.activeFormation?{...f,positions:f.positions.map(p=>p.id===pid?{...p,label}:p)}:f);
  STATE.team={...STATE.team,formations:updated};renderLineupView();
}
function addFormation(){
  const name=el("new-form-name")?.value?.trim();if(!name)return;
  const formations=STATE.team.formations||DEFAULT_FORMATIONS;
  const newF={name,positions:[{id:"gk",label:"GK",x:50,y:88}]};
  const updated=[...formations,newF];
  STATE.team={...STATE.team,formations:updated};STATE.activeFormation=updated.length-1;STATE.lineup={};renderLineupView();
}
async function saveLineup(){
  const btn=document.querySelector("#content button[onclick='saveLineup()']");
  if(btn){btn.textContent="Saving...";}
  try{
    await sb.from("teams").update({formations:STATE.team.formations,lineup:STATE.lineup,active_formation:STATE.activeFormation}).eq("id",STATE.team.id);
    if(btn){btn.textContent="Saved ✓";setTimeout(()=>{if(btn)btn.textContent="Save";},2000);}
  }catch(e){alert("Error saving: "+e.message);}
}

// ── Settings ──────────────────────────────────────────────────────────────────
function renderSettings(){
  return`
  <div style="max-width:520px">
    <div style="font-size:20px;font-weight:700;margin-bottom:1.25rem">Settings</div>
    <div class="card" style="display:flex;flex-direction:column;gap:16px;margin-bottom:14px">
      <div>
        <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px;font-weight:500">Team name</label>
        <input id="s-name" value="${STATE.team.name}"/>
      </div>
      <div>
        <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px;font-weight:500">New coach password <span style="color:#94a3b8;font-weight:400">(leave blank to keep)</span></label>
        <input id="s-coach" type="password" placeholder="New password"/>
      </div>
      <div>
        <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px;font-weight:500">New player password <span style="color:#94a3b8;font-weight:400">(leave blank to keep)</span></label>
        <input id="s-player" type="password" placeholder="New password"/>
      </div>
      <div class="check-row" onclick="togglePublic()" id="pub-row">
        <div class="custom-check${STATE.team.leaderboard_public?" checked":""}" id="pub-check">
          ${STATE.team.leaderboard_public?`<i class="ti ti-check" style="font-size:13px;color:#fff"></i>`:""}
        </div>
        <div>
          <div style="font-size:15px;font-weight:500">Make leaderboard public</div>
          <div style="font-size:12px;color:var(--muted)">Players can see the goal leaderboard</div>
        </div>
      </div>
      <button class="gbtn" id="save-settings-btn" onclick="saveSettings()">Save settings</button>
    </div>
    <button onclick="doLogout()" style="width:100%;background:#fff;border:1px solid #fecaca;border-radius:12px;color:#dc2626;padding:14px;font-size:16px;cursor:pointer;font-weight:500;min-height:52px">Sign out</button>
  </div>`;
}
function togglePublic(){
  const val=!STATE.team.leaderboard_public;
  STATE.team={...STATE.team,leaderboard_public:val};
  const check=el("pub-check");
  if(check){check.className="custom-check"+(val?" checked":"");check.innerHTML=val?`<i class="ti ti-check" style="font-size:13px;color:#fff">`:""`;}
}
async function saveSettings(){
  const btn=el("save-settings-btn");if(btn){btn.disabled=true;btn.textContent="Saving...";}
  try{
    const patch={leaderboard_public:STATE.team.leaderboard_public};
    const name=el("s-name")?.value?.trim();
    const coach=el("s-coach")?.value;
    const player=el("s-player")?.value;
    if(name&&name!==STATE.team.name)patch.name=name;
    if(coach)patch.coach_pass=coach;
    if(player)patch.player_pass=player;
    const{error}=await sb.from("teams").update(patch).eq("id",STATE.team.id);
    if(error)throw new Error(error.message);
    STATE.team={...STATE.team,...patch};
    if(btn){btn.textContent="Saved ✓";setTimeout(()=>{if(btn){btn.disabled=false;btn.textContent="Save settings";}},2000);}
  }catch(e){alert("Error: "+e.message);if(btn){btn.disabled=false;btn.textContent="Save settings";}}
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
