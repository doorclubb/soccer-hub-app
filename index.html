<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soccer Hub - Team Management</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #141b2a;
      --bg-tertiary: #1a2333;
      --border-primary: #2d3748;
      --border-hover: #3b82f6;
      --text-primary: #f9fafb;
      --text-secondary: #e5e7eb;
      --text-muted: #9ca3af;
      --text-dim: #6b7280;
      --accent-blue: #3b82f6;
      --accent-blue-dark: #2563eb;
      --accent-blue-light: #60a5fa;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-yellow: #fbbf24;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 20px rgba(0, 0, 0, 0.5);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --transition-fast: 0.15s ease;
      --transition-normal: 0.2s ease;
      --transition-slow: 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-secondary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-md);
      transition: all var(--transition-normal);
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
      font-family: inherit;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:active::before {
      width: 300px;
      height: 300px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-blue-dark) 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--accent-blue-light) 0%, var(--accent-blue) 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border-primary);
    }

    .btn-secondary:hover {
      background: #4b5563;
      border-color: var(--text-muted);
      transform: translateY(-1px);
    }

    input, select {
      width: 100%;
      padding: 0.875rem 1rem;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-primary);
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-size: 0.9375rem;
      font-family: inherit;
      transition: all var(--transition-fast);
    }

    input:hover, select:hover {
      border-color: var(--text-dim);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      background: var(--bg-secondary);
    }

    h1 {
      font-size: 1.875rem;
      margin-bottom: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.025em;
    }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.015em;
    }

    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-blue-dark) 100%);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .tab-bar {
      display: flex;
      gap: 0.375rem;
      background: var(--bg-primary);
      padding: 0.375rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border-primary);
    }

    .tab-btn {
      flex: 1;
      padding: 0.75rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      font-family: inherit;
    }

    .tab-btn:hover {
      color: var(--text-secondary);
      background: var(--bg-tertiary);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-blue-dark) 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }

    .hidden {
      display: none !important;
    }

    .error {
      color: #ef4444;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      text-align: center;
    }

    .success {
      color: #10b981;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      text-align: center;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      transition: all var(--transition-normal);
    }

    .stat-card:hover {
      border-color: var(--accent-blue);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-blue-dark));
    }

    .stat-label {
      font-size: 0.8125rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .stat-value {
      font-size: 2.25rem;
      font-weight: 700;
      color: #f9fafb;
      line-height: 1;
    }

    .nav {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      border-radius: var(--radius-md);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(10px);
    }

    .nav-btn {
      padding: 0.625rem 1rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 500;
      transition: all var(--transition-fast);
      font-size: 0.9375rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: inherit;
    }

    .nav-btn:hover {
      color: var(--text-secondary);
      background: var(--bg-tertiary);
      transform: translateY(-1px);
    }

    .nav-btn.active {
      color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.15);
      font-weight: 600;
    }

    .score-display {
      font-size: 4.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-blue-light) 0%, var(--accent-blue) 50%, var(--accent-blue-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      letter-spacing: -0.05em;
      text-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
    }

    .game-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all var(--transition-normal);
    }

    .game-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
      background: var(--bg-tertiary);
    }

    .game-bar {
      width: 4px;
      height: 56px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .bar-win { background: #10b981; }
    .bar-loss { background: #ef4444; }
    .bar-draw { background: #6b7280; }
    .bar-upcoming { background: #3b82f6; }

    .player-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all var(--transition-normal);
    }

    .player-card:hover {
      border-color: var(--text-dim);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-blue-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.125rem;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .grid {
      display: grid;
      gap: 1rem;
    }

    .grid-2 {
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }

    .icon {
      width: 20px;
      height: 20px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .score-display {
        font-size: 3rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      h2 {
        font-size: 1.125rem;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
      }

      .stat-card {
        padding: 1.25rem 1rem;
      }

      .stat-value {
        font-size: 2rem;
      }

      .card {
        padding: 1.25rem;
      }

      .btn {
        padding: 0.875rem 1.25rem;
        font-size: 0.875rem;
        min-height: 44px;
      }

      .nav {
        padding: 0.875rem 1rem;
        gap: 0.5rem;
      }

      .nav-btn {
        padding: 0.75rem 0.875rem;
        font-size: 0.875rem;
        min-height: 44px;
      }

      .game-card {
        padding: 1rem;
        gap: 0.75rem;
      }

      .player-card {
        padding: 1rem;
        gap: 0.875rem;
      }

      .avatar {
        width: 40px;
        height: 40px;
        font-size: 1rem;
      }

      input, select {
        padding: 0.875rem;
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.375rem;
      }

      .score-display {
        font-size: 2.5rem;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }

      .stat-card {
        padding: 1rem 0.875rem;
      }

      .stat-value {
        font-size: 1.75rem;
      }

      .stat-label {
        font-size: 0.75rem;
      }

      .nav {
        flex-direction: column;
        align-items: stretch;
      }

      .nav-btn {
        width: 100%;
        justify-content: flex-start;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-container">
      <div style="text-align: center;">
        <div style="color: #6b7280; font-size: 1.125rem; margin-top: 2rem;">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    console.log('App starting...');

    // Check if Supabase loaded
    if (typeof supabase === 'undefined') {
      document.getElementById('app').innerHTML = `
        <div class="login-container">
          <div style="text-align: center; color: #ef4444;">
            <h2>Error Loading App</h2>
            <p>Supabase library failed to load. Please refresh the page.</p>
          </div>
        </div>
      `;
      throw new Error('Supabase not loaded');
    }

    console.log('Supabase loaded successfully');

    // Initialize Supabase
    const sb = supabase.createClient(
      'https://fmaingdxxgbrqikhvahn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtYWluZ2R4eGdicnFpa2h2YWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMTU3NTQsImV4cCI6MjA5MzY5MTc1NH0.piDxT5Mjqd1HPxHwMwdWBK5vX9pJaQfCTODnZVkjST8'
    );

    console.log('Supabase client created');

    // State
    let state = {
      user: null,
      team: null,
      players: [],
      games: [],
      view: 'login',
      activeGame: null,
      timerInterval: null
    };

    // Seed games with goals counted in home_score
    const SEED_GAMES = [
      {opponent:"JC United FC",date:"2026-02-28",time:"11:30",venue:"HP 12 West",home_score:5,away_score:1,finished:true},
      {opponent:"Athletico Espanol",date:"2026-03-14",time:"10:00",venue:"HP 11 West",home_score:0,away_score:3,finished:true},
      {opponent:"South Dallas Leon",date:"2026-03-28",time:"11:30",venue:"HP 12 East",home_score:4,away_score:3,finished:true},
      {opponent:"Arlington United",date:"2026-04-09",time:"18:15",venue:"HP 11 East",home_score:1,away_score:5,finished:true},
      {opponent:"Athletico Espanol",date:"2026-04-25",time:"14:30",venue:"HP 11 West",home_score:3,away_score:5,finished:true},
      {opponent:"South Dallas Leon",date:"2026-05-02",time:"14:30",venue:"HP 12 East",home_score:5,away_score:2,finished:true},
      {opponent:"Raptors",date:"2026-05-05",time:"18:00",venue:"HP 11 East",home_score:8,away_score:0,finished:true},
      {opponent:"Hurricanes",date:"2026-05-09",time:"14:30",venue:"HP 11 East",home_score:0,away_score:0,finished:false},
      {opponent:"Misumi/Spiderz 16-17B",date:"2026-05-16",time:"13:00",venue:"HP 11 West",home_score:0,away_score:0,finished:false},
      {opponent:"Raptors",date:"2026-05-17",time:"15:30",venue:"HP 11 West",home_score:0,away_score:0,finished:false}
    ];

    // Utility functions
    const getInitials = (name) => {
      return name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
    };

    const formatDate = (dateStr) => {
      if (!dateStr) return '';
      return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    };

    const formatTime = (ms) => {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    };

    const calculatePlayerStats = (playerId) => {
      let totalGoals = 0;
      let totalPlaytime = 0;

      for (const game of state.games) {
        // Count goals
        if (game.goals) {
          totalGoals += game.goals.filter(g => g.player_id === playerId).length;
        }

        // Sum playtime
        if (game.player_times && game.player_times[playerId]) {
          totalPlaytime += game.player_times[playerId];
        }
      }

      return { goals: totalGoals, playtime: totalPlaytime };
    };

    // LocalStorage persistence
    const saveSession = () => {
      if (state.user && state.team) {
        localStorage.setItem('soccerHubSession', JSON.stringify({
          user: state.user,
          team: state.team
        }));
      }
    };

    const loadSession = () => {
      const session = localStorage.getItem('soccerHubSession');
      if (session) {
        try {
          const data = JSON.parse(session);
          state.user = data.user;
          state.team = data.team;
          return true;
        } catch (e) {
          console.error('Failed to load session', e);
        }
      }
      return false;
    };

    const clearSession = () => {
      localStorage.removeItem('soccerHubSession');
    };

    // Load data
    async function loadData() {
      if (!state.team) return;

      try {
        const [playersRes, gamesRes] = await Promise.all([
          sb.from('players').select('*').eq('team_id', state.team.id).order('created_at'),
          sb.from('games').select('*').eq('team_id', state.team.id).order('date')
        ]);

        state.players = playersRes.data || [];
        state.games = gamesRes.data || [];
        console.log('Data loaded:', state.players.length, 'players,', state.games.length, 'games');
      } catch (error) {
        console.error('Error loading data:', error);
      }
    }

    // Login
    async function handleLogin(teamName, password, role) {
      console.log('Attempting login:', teamName, role);

      const { data, error } = await sb
        .from('teams')
        .select('*')
        .ilike('name', teamName)
        .single();

      if (error || !data) {
        throw new Error('Team not found');
      }

      const passField = role === 'coach' ? 'coach_pass' : 'player_pass';
      if (data[passField] !== password) {
        throw new Error('Incorrect password');
      }

      state.user = { role };
      state.team = data;
      saveSession();
      await loadData();
      state.view = 'dashboard';
      render();
    }

    async function handleCreateTeam(name, coachPass, playerPass) {
      console.log('Creating team:', name);

      const { data: existing } = await sb
        .from('teams')
        .select('id')
        .ilike('name', name);

      if (existing?.length) {
        throw new Error('Team name already taken');
      }

      const { data: team, error } = await sb
        .from('teams')
        .insert({
          name,
          coach_pass: coachPass,
          player_pass: playerPass || '',
          formations: [],
          lineup: {},
          active_formation: 0,
          leaderboard_public: false
        })
        .select()
        .single();

      if (error) throw error;

      // Seed games for Spiderz 16B
      if (name.toLowerCase().match(/spiderz 16b|itejugheueue/)) {
        const games = SEED_GAMES.map(g => ({
          ...g,
          team_id: team.id,
          goals: [],
          half: g.finished ? 2 : 0,
          half_started_at: null,
          player_times: {},
          player_on_field: {},
          film_link: ''
        }));
        await sb.from('games').insert(games);
      }

      return team;
    }

    // Render functions
    function renderLogin() {
      return `
        <div class="login-container">
          <div class="login-box">
            <div class="logo">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2 L12 22 M2 12 L22 12"/>
                <path d="M7 7 L17 17 M7 17 L17 7"/>
              </svg>
            </div>
            <h1 style="text-align: center; margin-bottom: 0.5rem;">Soccer Hub</h1>
            <p style="text-align: center; color: #9ca3af; margin-bottom: 2rem; font-size: 0.9375rem;">Professional Team Management</p>

            <div class="card">
              <div class="tab-bar">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="tab-create" onclick="switchTab('create')">New Team</button>
              </div>

              <div id="login-form">
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                  <input id="l-team" type="text" placeholder="Team name" />
                  <select id="l-role">
                    <option value="coach">Coach</option>
                    <option value="player">Player / Public</option>
                  </select>
                  <input id="l-pass" type="password" placeholder="Password" />
                  <div id="login-error" class="error hidden"></div>
                  <button onclick="doLogin()" class="btn btn-primary" style="width: 100%; justify-content: center;">Sign In</button>
                </div>
              </div>

              <div id="create-form" class="hidden">
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                  <input id="c-name" type="text" placeholder="Team name" />
                  <input id="c-coach" type="password" placeholder="Coach password" />
                  <input id="c-player" type="password" placeholder="Player password (optional)" />
                  <div id="create-error" class="error hidden"></div>
                  <button onclick="doCreate()" class="btn btn-primary" style="width: 100%; justify-content: center;">Create Team</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderDashboard() {
      const finished = state.games.filter(g => g.finished);
      const wins = finished.filter(g => g.home_score > g.away_score).length;
      const losses = finished.filter(g => g.home_score < g.away_score).length;
      const draws = finished.filter(g => g.home_score === g.away_score).length;

      // Count goals from both goals array AND home_score for seeded games
      const totalGoals = state.games.reduce((sum, g) => {
        if (g.goals && g.goals.length > 0) {
          // If there are goals tracked with players, count those
          return sum + g.goals.length;
        } else if (g.finished && g.home_score > 0) {
          // Otherwise for finished seeded games, count home_score
          return sum + g.home_score;
        }
        return sum;
      }, 0);

      // Calculate leaderboard
      const playerStats = state.players.map(p => {
        const stats = calculatePlayerStats(p.id);
        return { ...p, ...stats };
      }).sort((a, b) => b.goals - a.goals || b.playtime - a.playtime);

      return `
        <div class="container">
          <h1>Dashboard</h1>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">Record</div>
              <div class="stat-value">${wins}–${losses}–${draws}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Goals Scored</div>
              <div class="stat-value">${totalGoals}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Games Played</div>
              <div class="stat-value">${finished.length}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Players</div>
              <div class="stat-value">${state.players.length}</div>
            </div>
          </div>

          <div class="card">
            <h2>Leaderboard</h2>
            ${playerStats.length > 0 ? `
              <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                ${playerStats.map((p, idx) => `
                  <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem;
                    background: ${idx === 0 ? 'rgba(251, 191, 36, 0.12)' : '#111827'};
                    border-radius: 10px; border-left: 3px solid ${
                      idx === 0 ? '#fbbf24' : idx === 1 ? '#9ca3af' : idx === 2 ? '#cd7f32' : 'transparent'
                    };">
                    <div style="font-size: 1.125rem; font-weight: 700; color: #6b7280; min-width: 2rem; text-align: center;">
                      ${idx + 1}
                    </div>
                    ${p.photo ? `
                      <img src="${p.photo}" alt="${p.name}" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover;" />
                    ` : `
                      <div class="avatar" style="width: 44px; height: 44px; font-size: 1rem;">${getInitials(p.name)}</div>
                    `}
                    <div style="flex: 1; font-weight: 600; font-size: 0.9375rem;">${p.name}</div>
                    <div style="font-size: 1.625rem; font-weight: 700; color: #3b82f6; min-width: 2.5rem; text-align: right;">
                      ${p.goals}
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : `
              <p style="color: #6b7280; text-align: center; padding: 2rem;">
                No player stats yet. Start tracking games to see the leaderboard!
              </p>
            `}
          </div>
        </div>
      `;
    }

                    <div style="font-size: 0.75rem; color: ${won ? '#10b981' : lost ? '#ef4444' : '#6b7280'}; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">
                      ${won ? 'Win' : lost ? 'Loss' : 'Draw'}

                  </div>
                  ${state.user.role === 'coach' ? `<i data-lucide="edit-2" class="icon" style="color: #6b7280; margin-left: 0.75rem;"></i>` : ''}

          <div id="edit-game-modal" class="hidden" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.92); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem;">

    function renderLiveGame() {
      const upcomingGames = state.games.filter(g => !g.finished).sort((a, b) => a.date.localeCompare(b.date));

      if (!state.activeGame) {
        return `
          <div class="container">
            <h1>Live Game</h1>
            ${upcomingGames.length > 0 ? `
              <div class="card">
                <h2>Select a game to track</h2>
                ${upcomingGames.map(g => `
                  <div class="game-card" onclick="startGame('${g.id}')" style="cursor: pointer;">
                    <div class="game-bar bar-upcoming"></div>
                    <div style="flex: 1;">
                      <div style="font-weight: 600; font-size: 1rem;">vs ${g.opponent}</div>
                      <div style="font-size: 0.875rem; color: #9ca3af; margin-top: 0.25rem;">${formatDate(g.date)} · ${g.time} · ${g.venue}</div>
                    </div>
                    <i data-lucide="chevron-right" class="icon" style="color: #6b7280;"></i>
                  </div>
                `).join('')}
              </div>
            ` : `
              <div class="card">
                <p style="color: #6b7280;">No upcoming games scheduled</p>
              </div>
            `}
          </div>
        `;
      }

      const game = state.activeGame;
      const halfRunning = game.half_started_at !== null;

      // Show starting lineup selector if game hasn't started
      if (game.half === 0 && !state.startingLineupSelected) {
        return `
          <div class="container">
            <div class="card">
              <h1 style="margin-bottom: 0.5rem;">${state.team.name} vs ${game.opponent}</h1>
              <h2 style="color: #9ca3af; font-weight: 500; margin-bottom: 2rem;">Select Starting Lineup</h2>
              <p style="color: #9ca3af; margin-bottom: 1.5rem; font-size: 0.9375rem;">Choose which players will start on the field</p>

              <div style="display: grid; gap: 0.75rem;">
                ${state.players.map(p => {
                  const isSelected = state.tempStarting?.includes(p.id);
                  return `
                    <div onclick="toggleStarting('${p.id}')" class="player-card"
                      style="cursor: pointer; background: ${isSelected ? 'rgba(59, 130, 246, 0.15)' : '#1a1f2e'};
                      border: 2px solid ${isSelected ? '#3b82f6' : '#2d3748'};">
                      ${p.photo ? `
                        <img src="${p.photo}" alt="${p.name}" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover;" />
                      ` : `
                        <div class="avatar">${getInitials(p.name)}</div>
                      `}
                      <div style="flex: 1;">
                        <div style="font-weight: 600; font-size: 1rem;">${p.name}</div>
                        <div style="font-size: 0.875rem; color: ${isSelected ? '#3b82f6' : '#9ca3af'}; margin-top: 0.25rem;">
                          ${isSelected ? 'Starting' : 'Tap to select'}
                        </div>
                      </div>
                      ${isSelected ? `<i data-lucide="check-circle" class="icon" style="color: #3b82f6;"></i>` : ''}
                    </div>
                  `;
                }).join('')}
              </div>

              <button onclick="confirmStarting()" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; justify-content: center; font-size: 1rem; padding: 1rem;">
                Continue (${state.tempStarting?.length || 0} players selected)
              </button>
            </div>
          </div>
        `;
      }

      // Calculate game time
      const allPlayerTimes = Object.values(game.player_times || {});
      const avgTime = allPlayerTimes.length > 0
        ? allPlayerTimes.reduce((a, b) => a + b, 0) / allPlayerTimes.length
        : 0;
      const currentElapsed = halfRunning ? Date.now() - game.half_started_at : 0;
      const gameTime = avgTime + currentElapsed;

      const onFieldCount = Object.values(game.player_on_field || {}).filter(Boolean).length;

      return `
        <div class="container">
          <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
              <div>
                <div style="font-size: 0.875rem; color: #9ca3af; margin-bottom: 0.5rem;">
                  ${formatDate(game.date)} · ${game.time}
                </div>
                <div style="font-size: 1.5rem; font-weight: 700;">${state.team.name} vs ${game.opponent}</div>
              </div>
              <button onclick="endGame()" class="btn btn-secondary">
                <i data-lucide="square" class="icon"></i> End Game
              </button>
            </div>

            <div style="text-align: center; margin: 2.5rem 0;">
              <div class="score-display" id="score-display">${game.home_score} – ${game.away_score}</div>
              <div style="font-size: 1.125rem; color: #9ca3af; margin-top: 0.75rem; font-weight: 500;" id="game-timer">
                <i data-lucide="clock" class="icon" style="display: inline; width: 18px; height: 18px; vertical-align: middle;"></i>
                ${formatTime(gameTime)}
              </div>
              <div style="display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap;">
                <button onclick="adjustScore(-1)" class="btn btn-secondary" style="min-width: 48px;">−</button>
                <button onclick="showGoalScorer()" class="btn btn-primary" style="font-size: 1.0625rem; padding: 1rem 2rem;">
                  <i data-lucide="target" class="icon"></i> Goal
                </button>
              </div>
            </div>

            <div id="goal-scorer-modal" class="hidden" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0;
              background: rgba(0, 0, 0, 0.92); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem;">
              <div class="card" style="max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto;">
                <h2 style="font-size: 2rem; margin-bottom: 0.75rem; text-align: center;">Goal Scored!</h2>
                <p style="text-align: center; color: #9ca3af; margin-bottom: 2rem;">Who scored?</p>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem;">
                  ${state.players.map(p => `
                    <button onclick="addGoal('${p.id}')" class="btn btn-secondary"
                      style="text-align: left; padding: 1.25rem; height: auto; transition: all 0.2s; justify-content: flex-start;"
                      onmouseover="this.style.transform='scale(1.02)'; this.style.background='rgba(59, 130, 246, 0.2)'"
                      onmouseout="this.style.transform='scale(1)'; this.style.background='#374151'">
                      <div style="display: flex; align-items: center; gap: 1rem; width: 100%;">
                        ${p.photo ? `
                          <img src="${p.photo}" alt="${p.name}" style="width: 56px; height: 56px; border-radius: 50%; object-fit: cover;" />
                        ` : `
                          <div class="avatar" style="width: 56px; height: 56px; font-size: 1.25rem;">${getInitials(p.name)}</div>
                        `}
                        <span style="font-weight: 600; font-size: 1.125rem; flex: 1;">${p.name}</span>
                      </div>
                    </button>
                  `).join('')}
                </div>
                <button onclick="hideGoalScorer()" class="btn btn-secondary" style="width: 100%; margin-top: 1.5rem; padding: 1rem; font-size: 1rem; justify-content: center;">Cancel</button>
              </div>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;">
              ${game.half === 0 ? `
                <button onclick="startHalf(1)" class="btn btn-primary" style="flex: 1; justify-content: center;">
                  <i data-lucide="play" class="icon"></i> Start 1st Half
                </button>
              ` : game.half === 1 ? `
                ${halfRunning ? `
                  <button onclick="endHalf()" class="btn btn-secondary" style="flex: 1; justify-content: center;">
                    <i data-lucide="pause" class="icon"></i> End 1st Half
                  </button>
                ` : `
                  <button onclick="startHalf(1)" class="btn btn-primary" style="flex: 1; justify-content: center;">
                    <i data-lucide="play" class="icon"></i> Resume 1st Half
                  </button>
                  <button onclick="startHalf(2)" class="btn btn-primary" style="flex: 1; justify-content: center;">
                    <i data-lucide="play" class="icon"></i> Start 2nd Half
                  </button>
                `}
              ` : game.half === 2 ? `
                ${halfRunning ? `
                  <button onclick="endHalf()" class="btn btn-secondary" style="flex: 1; justify-content: center;">
                    <i data-lucide="pause" class="icon"></i> End 2nd Half
                  </button>
                ` : `
                  <button onclick="startHalf(2)" class="btn btn-primary" style="flex: 1; justify-content: center;">
                    <i data-lucide="play" class="icon"></i> Resume 2nd Half
                  </button>
                `}
              ` : ''}
            </div>

            <div style="margin-top: 1.5rem; padding: 1.25rem; background: #111827; border-radius: 10px; border: 1px solid #374151;">
              <div style="font-size: 0.875rem; color: #9ca3af; margin-bottom: 0.75rem;">
                <strong style="color: #e5e7eb;">Status:</strong> ${game.half === 0 ? 'Not Started' : game.half === 1 ? '1st Half' : '2nd Half'}
                ${halfRunning ? ' (Running)' : ' (Paused)'}
              </div>
              <div style="font-size: 0.875rem; color: #9ca3af;">
                <label style="color: #e5e7eb; font-weight: 500;">Film Link:</label>
                <input id="film-link" type="text" value="${game.film_link || ''}" onchange="updateFilmLink(this.value)"
                  placeholder="Enter video URL"
                  style="display: block; width: 100%; margin-top: 0.5rem; padding: 0.625rem; font-size: 0.875rem;" />
              </div>
            </div>
          </div>

          <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
              <h2 style="margin: 0;">Players</h2>
              <div style="font-size: 0.875rem; color: #9ca3af;">
                <span style="color: #10b981; font-weight: 600;">${onFieldCount}</span> on field ·
                <span style="color: #9ca3af;">${state.players.length - onFieldCount}</span> bench
              </div>
            </div>

            <div style="margin-bottom: 1.5rem;">
              <h3 style="font-size: 0.8125rem; color: #10b981; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.875rem; font-weight: 600;">
                On Field
              </h3>
              <div id="players-on-field" style="display: grid; gap: 0.75rem;">
                ${state.players.filter(p => game.player_on_field?.[p.id]).map(p => {
                  const totalTime = game.player_times?.[p.id] || 0;
                  const currentTime = halfRunning ? Date.now() - game.half_started_at : 0;
                  const displayTime = totalTime + currentTime;

                  return `
                    <div class="player-card" style="background: rgba(16, 185, 129, 0.12); border-color: #10b981;">
                      ${p.photo ? `
                        <img src="${p.photo}" alt="${p.name}" style="width: 56px; height: 56px; border-radius: 50%; object-fit: cover;" />
                      ` : `
                        <div class="avatar" style="width: 56px; height: 56px; font-size: 1.25rem;">${getInitials(p.name)}</div>
                      `}
                      <div style="flex: 1;">
                        <div style="font-weight: 700; font-size: 1.0625rem;">${p.name}</div>
                        <div style="font-size: 1rem; color: #10b981; font-weight: 600; margin-top: 0.25rem;" id="timer-${p.id}">
                          ${formatTime(displayTime)}
                        </div>
                      </div>
                      <button onclick="togglePlayer('${p.id}')" class="btn btn-secondary"
                        style="padding: 0.75rem 1rem; ${!halfRunning ? 'opacity: 0.4; cursor: not-allowed;' : ''}"
                        ${!halfRunning ? 'disabled' : ''}>
                        <i data-lucide="arrow-down-circle" class="icon"></i> Sub Out
                      </button>
                    </div>
                  `;
                }).join('') || '<div style="color: #6b7280; text-align: center; padding: 1.5rem; background: #111827; border-radius: 10px;">No players on field</div>'}
              </div>
            </div>

            <div>
              <h3 style="font-size: 0.8125rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.875rem; font-weight: 600;">
                Bench
              </h3>
              <div id="players-bench" style="display: grid; gap: 0.75rem;">
                ${state.players.filter(p => !game.player_on_field?.[p.id]).map(p => {
                  const totalTime = game.player_times?.[p.id] || 0;
                  const displayTime = totalTime;

                  return `
                    <div class="player-card" style="background: #111827;">
                      ${p.photo ? `
                        <img src="${p.photo}" alt="${p.name}" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover;" />
                      ` : `
                        <div class="avatar">${getInitials(p.name)}</div>
                      `}
                      <div style="flex: 1;">
                        <div style="font-weight: 600; font-size: 1rem;">${p.name}</div>
                        <div style="font-size: 0.875rem; color: #9ca3af; margin-top: 0.25rem;" id="timer-${p.id}">
                          ${formatTime(displayTime)}
                        </div>
                      </div>
                      <button onclick="togglePlayer('${p.id}')" class="btn btn-primary"
                        style="padding: 0.75rem 1rem; ${!halfRunning ? 'opacity: 0.4; cursor: not-allowed;' : ''}"
                        ${!halfRunning ? 'disabled' : ''}>
                        <i data-lucide="arrow-up-circle" class="icon"></i> Sub In
                      </button>
                    </div>
                  `;
                }).join('') || '<div style="color: #6b7280; text-align: center; padding: 1.5rem; background: #111827; border-radius: 10px;">All players on field</div>'}
              </div>
            </div>
          </div>

          ${game.goals?.length > 0 ? `
            <div class="card">
              <h2>Goals (${game.goals.length})</h2>
              ${game.goals.map((goal, idx) => {
                const player = state.players.find(p => p.id === goal.player_id);
                return `
                  <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem;
                    background: rgba(16, 185, 129, 0.12); border-radius: 10px; margin-bottom: 0.75rem; border: 1px solid rgba(16, 185, 129, 0.2);">
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                      <div style="width: 8px; height: 8px; border-radius: 50%; background: #10b981;"></div>
                      <div>
                        <div style="font-weight: 600; font-size: 1rem;">${player?.name || 'Unknown'}</div>
                        <div style="font-size: 0.875rem; color: #9ca3af;">${goal.minute}'</div>
                      </div>
                    </div>
                    <button onclick="removeGoal(${idx})" class="btn-secondary" style="padding: 0.5rem 0.75rem; font-size: 1.25rem; line-height: 1;">&times;</button>
                  </div>
                `;
              }).join('')}
            </div>
          ` : ''}
        </div>
      `;
    }

    function renderApp() {
      const views = state.user?.role === 'coach'
        ? ['dashboard', 'live', 'history', 'roster', 'settings']
        : ['dashboard', 'history', 'roster'];

      const iconMap = {
        dashboard: 'layout-dashboard',
        live: 'play-circle',
        history: 'calendar',
        roster: 'users',
        settings: 'settings'
      };

      return `
        <div class="container">
          <div class="nav">
            <div style="flex: 1; font-weight: 700; font-size: 1.125rem; display: flex; align-items: center; gap: 0.5rem; color: #f9fafb;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2 L12 22 M2 12 L22 12"/>
              </svg>
              ${state.team.name}
            </div>
            ${views.map(v => `
              <button onclick="setView('${v}')" class="nav-btn ${state.view === v ? 'active' : ''}">
                <i data-lucide="${iconMap[v]}" class="icon"></i>
                ${v.charAt(0).toUpperCase() + v.slice(1)}
              </button>
            `).join('')}
            <button onclick="logout()" class="nav-btn">
              <i data-lucide="log-out" class="icon"></i>
              Sign Out
            </button>
          </div>
        </div>

        <div id="view-content">
          ${state.view === 'dashboard' ? renderDashboard() :
            state.view === 'live' ? renderLiveGame() :
            state.view === 'history' ? renderHistory() :
            state.view === 'roster' ? renderRoster() :
            state.view === 'settings' ? renderSettings() : ''}
        </div>
      `;
    }

    // Event handlers
    window.switchTab = function(tab) {
      const loginBtn = document.getElementById('tab-login');
      const createBtn = document.getElementById('tab-create');
      const loginForm = document.getElementById('login-form');
      const createForm = document.getElementById('create-form');

      if (tab === 'login') {
        loginBtn.classList.add('active');
        createBtn.classList.remove('active');
        loginForm.classList.remove('hidden');
        createForm.classList.add('hidden');
      } else {
        loginBtn.classList.remove('active');
        createBtn.classList.add('active');
        loginForm.classList.add('hidden');
        createForm.classList.remove('hidden');
      }
    };

    window.doLogin = async function() {
      const team = document.getElementById('l-team').value.trim();
      const pass = document.getElementById('l-pass').value;
      const role = document.getElementById('l-role').value;
      const errEl = document.getElementById('login-error');

      if (!team || !pass) {
        errEl.textContent = 'Please fill in all fields';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        await handleLogin(team, pass, role);
      } catch (error) {
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
      }
    };

    window.doCreate = async function() {
      const name = document.getElementById('c-name').value.trim();
      const coach = document.getElementById('c-coach').value;
      const player = document.getElementById('c-player').value;
      const errEl = document.getElementById('create-error');

      if (!name || !coach) {
        errEl.textContent = 'Team name and coach password required';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        await handleCreateTeam(name, coach, player);
        errEl.className = 'success';
        errEl.textContent = 'Team created! Please sign in.';
        errEl.classList.remove('hidden');
        setTimeout(() => switchTab('login'), 1500);
      } catch (error) {
        errEl.className = 'error';
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
      }
    };

    window.setView = function(view) {
      state.view = view;
      render();
    };

    window.logout = function() {
      clearSession();
      state = {
        user: null,
        team: null,
        players: [],
        games: [],
        view: 'login',
        activeGame: null,
        timerInterval: null
      };
      render();
    };

    window.showAddPlayer = function() {
      const form = document.getElementById('add-player-form');
      form.classList.toggle('hidden');
    };

    window.addPlayer = async function() {
      const name = document.getElementById('np-name').value.trim();
      if (!name) return;

      const photoInput = document.getElementById('np-photo');
      let photoData = null;

      // Convert photo to base64 if provided
      if (photoInput.files && photoInput.files[0]) {
        const file = photoInput.files[0];
        photoData = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.readAsDataURL(file);
        });
      }

      const { data, error } = await sb
        .from('players')
        .insert({
          team_id: state.team.id,
          name,
          photo: photoData
        })
        .select()
        .single();

      if (error) {
        alert('Error adding player: ' + error.message);
        return;
      }

      state.players.push(data);
      document.getElementById('np-name').value = '';
      document.getElementById('np-photo').value = '';
      render();
    };

    window.removePlayer = async function(id) {
      if (!confirm('Remove this player?')) return;

      await sb.from('players').delete().eq('id', id);
      state.players = state.players.filter(p => p.id !== id);
      render();
    };

    window.showAddGame = function() {
      const form = document.getElementById('add-game-form');
      form.classList.toggle('hidden');
    };

    window.createGame = async function() {
      const opponent = document.getElementById('ng-opponent').value.trim();
      const date = document.getElementById('ng-date').value;
      const time = document.getElementById('ng-time').value;
      const venue = document.getElementById('ng-venue').value.trim();

      if (!opponent || !date || !time || !venue) {
        alert('Please fill in all fields');
        return;
      }

      const { data, error } = await sb
        .from('games')
        .insert({
          team_id: state.team.id,
          opponent,
          date,
          time,
          venue,
          home_score: 0,
          away_score: 0,
          finished: false,
          half: 0,
          half_started_at: null,
          player_times: {},
          player_on_field: {},
          goals: [],
          film_link: ''
        })
        .select()
        .single();

      if (error) {
        alert('Error creating game: ' + error.message);
        return;
      }

      state.games.push(data);
      document.getElementById('ng-opponent').value = '';
      document.getElementById('ng-date').value = '';
      document.getElementById('ng-time').value = '';
      document.getElementById('ng-venue').value = '';
      document.getElementById('add-game-form').classList.add('hidden');
      render();
    };

    // Live game functions
    window.startGame = function(gameId) {
      const game = state.games.find(g => g.id === gameId);
      if (!game) return;

      state.activeGame = game;
      state.startingLineupSelected = false;
      state.tempStarting = [];
      state.view = 'live';
      render();
    };

    window.toggleStarting = function(playerId) {
      if (!state.tempStarting) state.tempStarting = [];

      const index = state.tempStarting.indexOf(playerId);
      if (index > -1) {
        state.tempStarting.splice(index, 1);
      } else {
        if (state.tempStarting.length >= 7) {
          alert('Maximum 7 players can start on the field');
          return;
        }
        state.tempStarting.push(playerId);
      }
      render();
    };

    window.confirmStarting = async function() {
      if (!state.tempStarting || state.tempStarting.length === 0) {
        alert('Please select at least one player');
        return;
      }

      if (state.tempStarting.length > 7) {
        alert('Maximum 7 players can start on the field');
        return;
      }

      const playerOnField = {};
      state.tempStarting.forEach(id => {
        playerOnField[id] = true;
      });

      await sb.from('games').update({ player_on_field: playerOnField }).eq('id', state.activeGame.id);
      state.activeGame.player_on_field = playerOnField;
      state.startingLineupSelected = true;
      state.tempStarting = [];
      render();
    };

    window.endGame = async function() {
      if (!confirm('End this game? This will mark it as finished.')) return;

      // Stop timer
      if (state.timerInterval) {
        clearInterval(state.timerInterval);
        state.timerInterval = null;
      }

      // Update game as finished
      const updates = {
        finished: true,
        half_started_at: null
      };

      await sb.from('games').update(updates).eq('id', state.activeGame.id);
      Object.assign(state.activeGame, updates);

      // Reload games
      await loadData();
      state.activeGame = null;
      state.view = 'history';
      render();
    };

    window.startHalf = async function(half) {
      const now = Date.now();
      const updates = {
        half,
        half_started_at: now
      };

      await sb.from('games').update(updates).eq('id', state.activeGame.id);
      Object.assign(state.activeGame, updates);

      // Start timer
      startTimer();
      render();
    };

    window.endHalf = async function() {
      // Calculate and save player times
      const game = state.activeGame;
      const elapsed = Date.now() - game.half_started_at;

      const updatedTimes = { ...game.player_times };
      for (const [playerId, isOn] of Object.entries(game.player_on_field || {})) {
        if (isOn) {
          updatedTimes[playerId] = (updatedTimes[playerId] || 0) + elapsed;
        }
      }

      const updates = {
        half_started_at: null,
        player_times: updatedTimes
      };

      await sb.from('games').update(updates).eq('id', state.activeGame.id);
      Object.assign(state.activeGame, updates);

      // Stop timer
      if (state.timerInterval) {
        clearInterval(state.timerInterval);
        state.timerInterval = null;
      }

      render();
    };

    window.adjustScore = async function(delta) {
      const game = state.activeGame;
      const newScore = Math.max(0, game.home_score + delta);

      await sb.from('games').update({ home_score: newScore }).eq('id', game.id);
      game.home_score = newScore;
      render();
    };

    window.showGoalScorer = function() {
      document.getElementById('goal-scorer-modal').classList.remove('hidden');
    };

    window.hideGoalScorer = function() {
      document.getElementById('goal-scorer-modal').classList.add('hidden');
    };

    window.addGoal = async function(playerId) {
      const game = state.activeGame;
      const elapsed = game.half_started_at ? Date.now() - game.half_started_at : 0;
      const totalTime = Object.values(game.player_times || {}).reduce((a, b) => a + b, 0) + elapsed;
      const minute = Math.floor(totalTime / 60000);

      const goals = [...(game.goals || []), { player_id: playerId, minute }];
      const newScore = game.home_score + 1;

      await sb.from('games').update({ home_score: newScore, goals }).eq('id', game.id);
      game.home_score = newScore;
      game.goals = goals;

      hideGoalScorer();
      render();
    };

    window.togglePlayer = async function(playerId) {
      const game = state.activeGame;
      if (!game.half_started_at) return;

      const isCurrentlyOn = game.player_on_field?.[playerId] || false;
      const updatedOnField = { ...game.player_on_field, [playerId]: !isCurrentlyOn };

      await sb.from('games').update({ player_on_field: updatedOnField }).eq('id', game.id);
      game.player_on_field = updatedOnField;

      render();
    };

    window.updateFilmLink = async function(link) {
      await sb.from('games').update({ film_link: link }).eq('id', state.activeGame.id);
      state.activeGame.film_link = link;
    };

    window.removeGoal = async function(index) {
      const game = state.activeGame;
      const goals = [...game.goals];
      goals.splice(index, 1);

      const newScore = Math.max(0, game.home_score - 1);
      await sb.from('games').update({ goals, home_score: newScore }).eq('id', game.id);
      game.goals = goals;
      game.home_score = newScore;

      render();
    };

    function startTimer() {
      if (state.timerInterval) {
        clearInterval(state.timerInterval);
      }

      state.timerInterval = setInterval(() => {
        if (!state.activeGame || !state.activeGame.half_started_at) {
          clearInterval(state.timerInterval);
          state.timerInterval = null;
          return;
        }

        // Update all player timers
        const game = state.activeGame;
        const elapsed = Date.now() - game.half_started_at;

        for (const player of state.players) {
          const isOnField = game.player_on_field?.[player.id] || false;
          const totalTime = game.player_times?.[player.id] || 0;
          const currentTime = isOnField ? elapsed : 0;
          const displayTime = totalTime + currentTime;

          const timerEl = document.getElementById(`timer-${player.id}`);
          if (timerEl) {
            timerEl.textContent = formatTime(displayTime);
          }
        }

        // Update game timer
        const allPlayerTimes = Object.values(game.player_times || {});
        const avgTime = allPlayerTimes.length > 0
          ? allPlayerTimes.reduce((a, b) => a + b, 0) / allPlayerTimes.length
          : 0;
        const gameTime = avgTime + elapsed;

        const gameTimerEl = document.getElementById('game-timer');
        if (gameTimerEl) {
          const icon = gameTimerEl.querySelector('i[data-lucide="clock"]');
          gameTimerEl.textContent = formatTime(gameTime);
          if (icon) gameTimerEl.prepend(icon);
        }
      }, 1000);
    }

    // Settings functions
    window.toggleLeaderboard = async function(checked) {
      await sb.from('teams').update({ leaderboard_public: checked }).eq('id', state.team.id);
      state.team.leaderboard_public = checked;
    };

    window.updatePasswords = async function() {
      const coachPass = document.getElementById('new-coach-pass').value;
      const playerPass = document.getElementById('new-player-pass').value;

      if (!coachPass) {
        alert('Coach password is required');
        return;
      }

      const updates = { coach_pass: coachPass };
      if (playerPass) {
        updates.player_pass = playerPass;
      }

      await sb.from('teams').update(updates).eq('id', state.team.id);
      Object.assign(state.team, updates);

      alert('Passwords updated successfully');
      document.getElementById('new-coach-pass').value = '';
      document.getElementById('new-player-pass').value = '';
    };

    window.deleteTeam = async function() {
      if (!confirm('Are you sure you want to delete this team? This cannot be undone.')) return;
      if (!confirm('This will permanently delete all players, games, and data. Continue?')) return;

      await sb.from('teams').delete().eq('id', state.team.id);
      logout();
    };

    // Game editing functions
    window.showEditGame = function(gameId) {
      const game = state.games.find(g => g.id === gameId);
      if (!game) return;

      state.editingGame = game;

      document.getElementById('edit-opponent').value = game.opponent;
      document.getElementById('edit-date').value = game.date;
      document.getElementById('edit-time').value = game.time;
      document.getElementById('edit-venue').value = game.venue;

      if (game.finished) {
        document.getElementById('edit-scores-section').classList.remove('hidden');
        document.getElementById('edit-away-scores-section').classList.remove('hidden');
        document.getElementById('edit-home-score').value = game.home_score;
        document.getElementById('edit-away-score').value = game.away_score;
      } else {
        document.getElementById('edit-scores-section').classList.add('hidden');
        document.getElementById('edit-away-scores-section').classList.add('hidden');
      }

      document.getElementById('edit-game-modal').classList.remove('hidden');
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
    };

    window.hideEditGame = function() {
      document.getElementById('edit-game-modal').classList.add('hidden');
      state.editingGame = null;
    };

    window.saveGameEdit = async function() {
      if (!state.editingGame) return;

      const updates = {
        opponent: document.getElementById('edit-opponent').value.trim(),
        date: document.getElementById('edit-date').value,
        time: document.getElementById('edit-time').value,
        venue: document.getElementById('edit-venue').value.trim()
      };

      if (state.editingGame.finished) {
        updates.home_score = parseInt(document.getElementById('edit-home-score').value) || 0;
        updates.away_score = parseInt(document.getElementById('edit-away-score').value) || 0;
      }

      if (!updates.opponent || !updates.date || !updates.time || !updates.venue) {
        alert('Please fill in all fields');
        return;
      }

      await sb.from('games').update(updates).eq('id', state.editingGame.id);
      Object.assign(state.editingGame, updates);

      hideEditGame();
      render();
    };

    window.deleteGame = async function() {
      if (!state.editingGame) return;
      if (!confirm('Delete this game? This cannot be undone.')) return;

      await sb.from('games').delete().eq('id', state.editingGame.id);
      state.games = state.games.filter(g => g.id !== state.editingGame.id);

      hideEditGame();
      render();
    };

    // Main render
    function render() {
      console.log('Rendering, state.view:', state.view);
      const app = document.getElementById('app');

      if (!state.user || !state.team) {
        app.innerHTML = renderLogin();
      } else {
        app.innerHTML = renderApp();
      }

      // Initialize Lucide icons
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
    }

    // Initialize
    console.log('Initializing app...');

    // Try to restore session
    if (loadSession()) {
      console.log('Session restored');
      loadData().then(() => {
        state.view = 'dashboard';
        render();
      });
    } else {
      render();
    }
  </script>
</body>
</html>
