<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soccer Hub - Team Management</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0f1a 0%, #1a1f2e 100%);
      color: #e2e8f0;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
    }

    .card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(148, 163, 184, 0.1);
      color: #e2e8f0;
    }

    input, select {
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.5);
      color: #e2e8f0;
      font-size: 1rem;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #0ea5e9;
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .tab-bar {
      display: flex;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.3);
      padding: 0.25rem;
      border-radius: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.75rem;
      background: transparent;
      border: none;
      color: rgba(226, 232, 240, 0.5);
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
      color: white;
    }

    .hidden {
      display: none !important;
    }

    .error {
      color: #f87171;
      font-size: 0.875rem;
      margin-top: 0.5rem;
      text-align: center;
    }

    .success {
      color: #4ade80;
      font-size: 0.875rem;
      margin-top: 0.5rem;
      text-align: center;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 0.75rem;
      padding: 1rem;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #06b6d4;
    }

    .nav {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      padding: 1rem;
      margin-bottom: 1.5rem;
      border-radius: 1rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 0.5rem 1rem;
      background: transparent;
      border: none;
      color: rgba(226, 232, 240, 0.6);
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .nav-btn:hover {
      color: #e2e8f0;
      background: rgba(148, 163, 184, 0.1);
    }

    .nav-btn.active {
      color: #06b6d4;
      background: rgba(6, 182, 212, 0.1);
    }

    .score-display {
      font-size: 4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .game-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .game-bar {
      width: 4px;
      height: 48px;
      border-radius: 2px;
    }

    .bar-win { background: #10b981; }
    .bar-loss { background: #ef4444; }
    .bar-draw { background: #6b7280; }
    .bar-upcoming { background: #3b82f6; }

    .player-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
    }

    .grid {
      display: grid;
      gap: 1rem;
    }

    .grid-2 {
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    }

    @media (max-width: 768px) {
      .score-display {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-container">
      <div style="text-align: center;">
        <div style="color: #94a3b8; font-size: 1.5rem; margin-top: 2rem;">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    console.log('App starting...');

    // Check if Supabase loaded
    if (typeof supabase === 'undefined') {
      document.getElementById('app').innerHTML = `
        <div class="login-container">
          <div style="text-align: center; color: #f87171;">
            <h2>Error Loading App</h2>
            <p>Supabase library failed to load. Please refresh the page.</p>
          </div>
        </div>
      `;
      throw new Error('Supabase not loaded');
    }

    console.log('Supabase loaded successfully');

    // Initialize Supabase
    const sb = supabase.createClient(
      'https://fmaingdxxgbrqikhvahn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtYWluZ2R4eGdicnFpa2h2YWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMTU3NTQsImV4cCI6MjA5MzY5MTc1NH0.piDxT5Mjqd1HPxHwMwdWBK5vX9pJaQfCTODnZVkjST8'
    );

    console.log('Supabase client created');

    // State
    let state = {
      user: null,
      team: null,
      players: [],
      games: [],
      view: 'login',
      activeGame: null,
      timerInterval: null
    };

    // Seed games
    const SEED_GAMES = [
      {opponent:"JC United FC",date:"2026-02-28",time:"11:30",venue:"HP 12 West",home_score:5,away_score:1,finished:true},
      {opponent:"Athletico Espanol",date:"2026-03-14",time:"10:00",venue:"HP 11 West",home_score:0,away_score:3,finished:true},
      {opponent:"South Dallas Leon",date:"2026-03-28",time:"11:30",venue:"HP 12 East",home_score:4,away_score:3,finished:true},
      {opponent:"Arlington United",date:"2026-04-09",time:"18:15",venue:"HP 11 East",home_score:1,away_score:5,finished:true},
      {opponent:"Athletico Espanol",date:"2026-04-25",time:"14:30",venue:"HP 11 West",home_score:3,away_score:5,finished:true},
      {opponent:"South Dallas Leon",date:"2026-05-02",time:"14:30",venue:"HP 12 East",home_score:5,away_score:2,finished:true},
      {opponent:"Raptors",date:"2026-05-05",time:"18:00",venue:"HP 11 East",home_score:8,away_score:0,finished:true},
      {opponent:"Hurricanes",date:"2026-05-09",time:"14:30",venue:"HP 11 East",home_score:0,away_score:0,finished:false},
      {opponent:"Misumi/Spiderz 16-17B",date:"2026-05-16",time:"13:00",venue:"HP 11 West",home_score:0,away_score:0,finished:false},
      {opponent:"Raptors",date:"2026-05-17",time:"15:30",venue:"HP 11 West",home_score:0,away_score:0,finished:false}
    ];

    // Utility functions
    const getInitials = (name) => {
      return name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
    };

    const formatDate = (dateStr) => {
      if (!dateStr) return '';
      return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    };

    const formatTime = (ms) => {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    };

    const calculatePlayerStats = (playerId) => {
      let totalGoals = 0;
      let totalPlaytime = 0;

      for (const game of state.games) {
        // Count goals
        if (game.goals) {
          totalGoals += game.goals.filter(g => g.player_id === playerId).length;
        }

        // Sum playtime
        if (game.player_times && game.player_times[playerId]) {
          totalPlaytime += game.player_times[playerId];
        }
      }

      return { goals: totalGoals, playtime: totalPlaytime };
    };

    // Load data
    async function loadData() {
      if (!state.team) return;

      try {
        const [playersRes, gamesRes] = await Promise.all([
          sb.from('players').select('*').eq('team_id', state.team.id).order('created_at'),
          sb.from('games').select('*').eq('team_id', state.team.id).order('date')
        ]);

        state.players = playersRes.data || [];
        state.games = gamesRes.data || [];
        console.log('Data loaded:', state.players.length, 'players,', state.games.length, 'games');
      } catch (error) {
        console.error('Error loading data:', error);
      }
    }

    // Login
    async function handleLogin(teamName, password, role) {
      console.log('Attempting login:', teamName, role);

      const { data, error } = await sb
        .from('teams')
        .select('*')
        .ilike('name', teamName)
        .single();

      if (error || !data) {
        throw new Error('Team not found');
      }

      const passField = role === 'coach' ? 'coach_pass' : 'player_pass';
      if (data[passField] !== password) {
        throw new Error('Incorrect password');
      }

      state.user = { role };
      state.team = data;
      await loadData();
      state.view = 'dashboard';
      render();
    }

    async function handleCreateTeam(name, coachPass, playerPass) {
      console.log('Creating team:', name);

      const { data: existing } = await sb
        .from('teams')
        .select('id')
        .ilike('name', name);

      if (existing?.length) {
        throw new Error('Team name already taken');
      }

      const formations = [{
        name: "1-2-3-1",
        positions: [
          {id:"gk",label:"GK",x:50,y:85},
          {id:"lb",label:"LB",x:25,y:65},{id:"rb",label:"RB",x:75,y:65},
          {id:"lw",label:"LW",x:15,y:40},{id:"cm",label:"CM",x:50,y:50},{id:"rw",label:"RW",x:85,y:40},
          {id:"st",label:"ST",x:50,y:15}
        ]
      }];

      const { data: team, error } = await sb
        .from('teams')
        .insert({
          name,
          coach_pass: coachPass,
          player_pass: playerPass || '',
          formations,
          lineup: {},
          active_formation: 0,
          leaderboard_public: false
        })
        .select()
        .single();

      if (error) throw error;

      // Seed games
      if (name.toLowerCase().match(/spiderz 16b|itejugheueue/)) {
        const games = SEED_GAMES.map(g => ({
          ...g,
          team_id: team.id,
          goals: [],
          half: g.finished ? 2 : 0,
          half_started_at: null,
          player_times: {},
          player_on_field: {},
          film_link: ''
        }));
        await sb.from('games').insert(games);
      }

      return team;
    }

    // Render functions
    function renderLogin() {
      return `
        <div class="login-container">
          <div class="login-box">
            <div class="logo">⚽</div>
            <h1 style="text-align: center; margin-bottom: 0.5rem;">Soccer Hub</h1>
            <p style="text-align: center; color: #94a3b8; margin-bottom: 2rem;">Professional Team Management</p>

            <div class="card">
              <div class="tab-bar">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="tab-create" onclick="switchTab('create')">New Team</button>
              </div>

              <div id="login-form">
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                  <input id="l-team" type="text" placeholder="Team name" />
                  <select id="l-role">
                    <option value="coach">Coach</option>
                    <option value="player">Player / Public</option>
                  </select>
                  <input id="l-pass" type="password" placeholder="Password" />
                  <div id="login-error" class="error hidden"></div>
                  <button onclick="doLogin()" class="btn btn-primary" style="width: 100%;">Sign In</button>
                </div>
              </div>

              <div id="create-form" class="hidden">
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                  <input id="c-name" type="text" placeholder="Team name" />
                  <input id="c-coach" type="password" placeholder="Coach password" />
                  <input id="c-player" type="password" placeholder="Player password (optional)" />
                  <div id="create-error" class="error hidden"></div>
                  <button onclick="doCreate()" class="btn btn-primary" style="width: 100%;">Create Team</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderDashboard() {
      const finished = state.games.filter(g => g.finished);
      const wins = finished.filter(g => g.home_score > g.away_score).length;
      const losses = finished.filter(g => g.home_score < g.away_score).length;
      const draws = finished.filter(g => g.home_score === g.away_score).length;
      const totalGoals = state.games.reduce((sum, g) => sum + (g.goals?.length || 0), 0);

      return `
        <div class="container">
          <h1>Dashboard</h1>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">Record</div>
              <div class="stat-value">${wins}–${losses}–${draws}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Goals</div>
              <div class="stat-value">${totalGoals}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Games</div>
              <div class="stat-value">${finished.length}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Players</div>
              <div class="stat-value">${state.players.length}</div>
            </div>
          </div>

          <div class="card">
            <p style="color: #94a3b8;">Welcome to ${state.team.name}!</p>
            <p style="margin-top: 0.5rem; color: #94a3b8;">Full features coming soon...</p>
          </div>
        </div>
      `;
    }

    function renderHistory() {
      const finished = state.games.filter(g => g.finished).sort((a, b) => b.date.localeCompare(a.date));
      const upcoming = state.games.filter(g => !g.finished).sort((a, b) => a.date.localeCompare(b.date));

      return `
        <div class="container">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h1>Schedule & Results</h1>
            ${state.user.role === 'coach' ? `
              <button onclick="showAddGame()" class="btn btn-primary">+ Add Game</button>
            ` : ''}
          </div>

          <div id="add-game-form" class="hidden card" style="margin-bottom: 1.5rem;">
            <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">New Game</h2>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
              <input id="ng-opponent" type="text" placeholder="Opponent name" />
              <input id="ng-date" type="date" />
              <input id="ng-time" type="time" />
              <input id="ng-venue" type="text" placeholder="Venue" />
              <button onclick="createGame()" class="btn btn-primary" style="width: 100%;">Create Game</button>
            </div>
          </div>

          ${upcoming.length > 0 ? `
            <h2 style="font-size: 0.875rem; color: #94a3b8; margin-top: 1.5rem; margin-bottom: 0.75rem;">UPCOMING</h2>
            ${upcoming.map(g => `
              <div class="game-card">
                <div class="game-bar bar-upcoming"></div>
                <div style="flex: 1;">
                  <div style="font-weight: 600;">vs ${g.opponent}</div>
                  <div style="font-size: 0.875rem; color: #94a3b8;">${formatDate(g.date)} · ${g.time} · ${g.venue}</div>
                </div>
              </div>
            `).join('')}
          ` : ''}

          ${finished.length > 0 ? `
            <h2 style="font-size: 0.875rem; color: #94a3b8; margin-top: 1.5rem; margin-bottom: 0.75rem;">RESULTS</h2>
            ${finished.map(g => {
              const won = g.home_score > g.away_score;
              const lost = g.home_score < g.away_score;
              const barClass = won ? 'bar-win' : lost ? 'bar-loss' : 'bar-draw';
              return `
                <div class="game-card">
                  <div class="game-bar ${barClass}"></div>
                  <div style="flex: 1;">
                    <div style="font-weight: 600;">vs ${g.opponent}</div>
                    <div style="font-size: 0.875rem; color: #94a3b8;">${formatDate(g.date)} · ${g.time} · ${g.venue}</div>
                  </div>
                  <div style="text-align: right;">
                    <div style="font-size: 1.25rem; font-weight: 700;">${g.home_score} – ${g.away_score}</div>
                    <div style="font-size: 0.75rem; color: ${won ? '#10b981' : lost ? '#ef4444' : '#6b7280'};">
                      ${won ? 'WIN' : lost ? 'LOSS' : 'DRAW'}
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          ` : ''}
        </div>
      `;
    }

    function renderRoster() {
      return `
        <div class="container">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h1>Roster (${state.players.length})</h1>
            ${state.user.role === 'coach' ? `
              <button onclick="showAddPlayer()" class="btn btn-primary">+ Add Player</button>
            ` : ''}
          </div>

          <div id="add-player-form" class="hidden card" style="margin-bottom: 1.5rem;">
            <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">New Player</h2>
            <input id="np-name" type="text" placeholder="Player name" style="margin-bottom: 1rem;" />
            <div style="margin-bottom: 1rem;">
              <label style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem; display: block;">Photo (optional)</label>
              <input id="np-photo" type="file" accept="image/*" style="padding: 0.5rem;" />
            </div>
            <button onclick="addPlayer()" class="btn btn-primary" style="width: 100%;">Add Player</button>
          </div>

          <div class="grid grid-2">
            ${state.players.map(p => {
              const stats = calculatePlayerStats(p.id);
              return `
                <div class="player-card">
                  ${p.photo ? `
                    <img src="${p.photo}" alt="${p.name}" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover;" />
                  ` : `
                    <div class="avatar">${getInitials(p.name)}</div>
                  `}
                  <div style="flex: 1;">
                    <div style="font-weight: 600;">${p.name}</div>
                    <div style="font-size: 0.875rem; color: #94a3b8;">⚽ ${stats.goals} goals · ${formatTime(stats.playtime)} played</div>
                  </div>
                  ${state.user.role === 'coach' ? `
                    <button onclick="removePlayer('${p.id}')" class="btn-secondary" style="padding: 0.5rem;">×</button>
                  ` : ''}
                </div>
              `;
            }).join('')}
          </div>

          ${state.players.length === 0 ? `
            <div style="text-align: center; padding: 3rem; color: #94a3b8;">
              No players yet. Add your first player to get started!
            </div>
          ` : ''}
        </div>
      `;
    }

    function renderLineup() {
      const formations = state.team.formations || [];
      const activeFormation = formations[state.team.active_formation || 0];
      const lineup = state.team.lineup || {};

      return `
        <div class="container">
          <h1>Lineup Builder</h1>

          ${formations.length > 0 ? `
            <div class="card" style="margin-bottom: 1rem;">
              <label style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem; display: block;">Formation</label>
              <select onchange="changeFormation(this.value)" style="margin-bottom: 0;">
                ${formations.map((f, idx) => `
                  <option value="${idx}" ${idx === state.team.active_formation ? 'selected' : ''}>${f.name}</option>
                `).join('')}
              </select>
            </div>

            ${activeFormation ? `
              <div class="card">
                <div style="position: relative; background: linear-gradient(to bottom, #10b981 0%, #059669 100%);
                  border-radius: 0.75rem; padding: 2rem 1rem; min-height: 500px;">

                  ${activeFormation.positions.map(pos => {
                    const assignedPlayer = lineup[pos.id];
                    const player = assignedPlayer ? state.players.find(p => p.id === assignedPlayer) : null;

                    return `
                      <div style="position: absolute; left: ${pos.x}%; top: ${pos.y}%;
                        transform: translate(-50%, -50%); text-align: center;">
                        <div style="width: 48px; height: 48px; border-radius: 50%;
                          background: ${player ? 'linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%)' : 'rgba(255, 255, 255, 0.3)'};
                          border: 2px solid white; display: flex; align-items: center; justify-content: center;
                          color: white; font-weight: 700; cursor: pointer; margin-bottom: 0.25rem;"
                          onclick="assignPosition('${pos.id}')">
                          ${player ? getInitials(player.name) : pos.label}
                        </div>
                        ${player ? `
                          <div style="font-size: 0.75rem; color: white; font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,0.5);">
                            ${player.name.split(' ')[0]}
                          </div>
                        ` : ''}
                      </div>
                    `;
                  }).join('')}
                </div>

                <div id="assign-player" class="hidden" style="margin-top: 1rem;">
                  <h3 style="font-size: 1rem; margin-bottom: 0.75rem;">Assign to <span id="pos-label"></span></h3>
                  <select id="player-select" style="margin-bottom: 0.75rem;">
                    <option value="">-- Clear Position --</option>
                    ${state.players.map(p => `
                      <option value="${p.id}">${p.name}</option>
                    `).join('')}
                  </select>
                  <button onclick="savePosition()" class="btn btn-primary" style="width: 100%;">Save</button>
                </div>
              </div>
            ` : ''}
          ` : `
            <div class="card">
              <p style="color: #94a3b8;">No formations available</p>
            </div>
          `}
        </div>
      `;
    }

    function renderSettings() {
      return `
        <div class="container">
          <h1>Settings</h1>

          <div class="card">
            <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Team Information</h2>
            <div style="margin-bottom: 1rem;">
              <label style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem; display: block;">Team Name</label>
              <div style="font-weight: 600; font-size: 1.125rem;">${state.team.name}</div>
            </div>

            <div style="margin-bottom: 1rem;">
              <label style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem; display: block;">
                Public Leaderboard
              </label>
              <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" ${state.team.leaderboard_public ? 'checked' : ''}
                  onchange="toggleLeaderboard(this.checked)"
                  style="width: auto; margin-right: 0.5rem;" />
                <span>Allow public access to team stats</span>
              </label>
            </div>
          </div>

          <div class="card">
            <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Passwords</h2>
            <p style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 1rem;">
              Update your team passwords
            </p>
            <div style="margin-bottom: 1rem;">
              <label style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem; display: block;">Coach Password</label>
              <input id="new-coach-pass" type="password" placeholder="New coach password" />
            </div>
            <div style="margin-bottom: 1rem;">
              <label style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem; display: block;">Player Password</label>
              <input id="new-player-pass" type="password" placeholder="New player password (optional)" />
            </div>
            <button onclick="updatePasswords()" class="btn btn-primary">Update Passwords</button>
          </div>

          <div class="card" style="border-color: rgba(239, 68, 68, 0.2);">
            <h2 style="font-size: 1.25rem; margin-bottom: 1rem; color: #f87171;">Danger Zone</h2>
            <p style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 1rem;">
              Permanently delete your team and all associated data
            </p>
            <button onclick="deleteTeam()" class="btn" style="background: #ef4444; color: white;">Delete Team</button>
          </div>
        </div>
      `;
    }

    function renderLiveGame() {
      const upcomingGames = state.games.filter(g => !g.finished).sort((a, b) => a.date.localeCompare(b.date));

      if (!state.activeGame) {
        return `
          <div class="container">
            <h1>Live Game</h1>
            ${upcomingGames.length > 0 ? `
              <div class="card">
                <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Select a game to track</h2>
                ${upcomingGames.map(g => `
                  <div class="game-card" onclick="startGame('${g.id}')" style="cursor: pointer;">
                    <div class="game-bar bar-upcoming"></div>
                    <div style="flex: 1;">
                      <div style="font-weight: 600;">vs ${g.opponent}</div>
                      <div style="font-size: 0.875rem; color: #94a3b8;">${formatDate(g.date)} · ${g.time} · ${g.venue}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : `
              <div class="card">
                <p style="color: #94a3b8;">No upcoming games scheduled</p>
              </div>
            `}
          </div>
        `;
      }

      const game = state.activeGame;
      const halfRunning = game.half_started_at !== null;

      return `
        <div class="container">
          <div class="card" style="margin-bottom: 1rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
              <div>
                <div style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.25rem;">
                  ${formatDate(game.date)} · ${game.time}
                </div>
                <div style="font-size: 1.5rem; font-weight: 700;">${state.team.name} vs ${game.opponent}</div>
              </div>
              <button onclick="endGame()" class="btn btn-secondary">End Game</button>
            </div>

            <div style="text-align: center; margin: 2rem 0;">
              <div class="score-display" id="score-display">${game.home_score} – ${game.away_score}</div>
              <div style="display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem;">
                <button onclick="adjustScore(-1)" class="btn btn-secondary">–</button>
                <button onclick="showGoalScorer()" class="btn btn-primary">+ Goal</button>
              </div>
            </div>

            <div id="goal-scorer-modal" class="hidden" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0;
              background: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 1000;">
              <div class="card" style="max-width: 400px; width: 90%; max-height: 80vh; overflow-y: auto;">
                <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Who scored?</h2>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                  ${state.players.map(p => `
                    <button onclick="addGoal('${p.id}')" class="btn btn-secondary" style="text-align: left; padding: 1rem;">
                      <div style="display: flex; align-items: center; gap: 1rem;">
                        ${p.photo ? `
                          <img src="${p.photo}" alt="${p.name}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;" />
                        ` : `
                          <div class="avatar" style="width: 40px; height: 40px; font-size: 1rem;">${getInitials(p.name)}</div>
                        `}
                        <span style="font-weight: 600;">${p.name}</span>
                      </div>
                    </button>
                  `).join('')}
                </div>
                <button onclick="hideGoalScorer()" class="btn btn-secondary" style="width: 100%; margin-top: 1rem;">Cancel</button>
              </div>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;">
              ${game.half === 0 ? `
                <button onclick="startHalf(1)" class="btn btn-primary" style="flex: 1;">Start 1st Half</button>
              ` : game.half === 1 ? `
                ${halfRunning ? `
                  <button onclick="endHalf()" class="btn btn-secondary" style="flex: 1;">End 1st Half</button>
                ` : `
                  <button onclick="startHalf(1)" class="btn btn-primary" style="flex: 1;">Resume 1st Half</button>
                  <button onclick="startHalf(2)" class="btn btn-primary" style="flex: 1;">Start 2nd Half</button>
                `}
              ` : game.half === 2 ? `
                ${halfRunning ? `
                  <button onclick="endHalf()" class="btn btn-secondary" style="flex: 1;">End 2nd Half</button>
                ` : `
                  <button onclick="startHalf(2)" class="btn btn-primary" style="flex: 1;">Resume 2nd Half</button>
                `}
              ` : ''}
            </div>

            <div style="margin-top: 1rem; padding: 1rem; background: rgba(0, 0, 0, 0.2); border-radius: 0.5rem;">
              <div style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem;">
                Half: ${game.half === 0 ? 'Not Started' : game.half === 1 ? '1st Half' : '2nd Half'}
                ${halfRunning ? ' (Running)' : ' (Paused)'}
              </div>
              <div style="font-size: 0.875rem; color: #94a3b8;">
                Film Link: <input id="film-link" type="text" value="${game.film_link || ''}" onchange="updateFilmLink(this.value)"
                  style="display: inline-block; width: auto; min-width: 200px; padding: 0.25rem 0.5rem; font-size: 0.875rem; margin-left: 0.5rem;" />
              </div>
            </div>
          </div>

          <div class="card">
            <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Players on Field</h2>
            <div id="players-list">
              ${state.players.map(p => {
                const isOnField = game.player_on_field?.[p.id] || false;
                const totalTime = game.player_times?.[p.id] || 0;
                const currentTime = isOnField && halfRunning ? Date.now() - game.half_started_at : 0;
                const displayTime = totalTime + currentTime;

                return `
                  <div class="player-card" style="background: ${isOnField ? 'rgba(16, 185, 129, 0.1)' : 'rgba(30, 41, 59, 0.6)'};">
                    ${p.photo ? `
                      <img src="${p.photo}" alt="${p.name}" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover;" />
                    ` : `
                      <div class="avatar">${getInitials(p.name)}</div>
                    `}
                    <div style="flex: 1;">
                      <div style="font-weight: 600;">${p.name}</div>
                      <div style="font-size: 0.875rem; color: #94a3b8;" id="timer-${p.id}">
                        ${formatTime(displayTime)}
                      </div>
                    </div>
                    <button onclick="togglePlayer('${p.id}')" class="btn ${isOnField ? 'btn-secondary' : 'btn-primary'}"
                      style="padding: 0.5rem 1rem; ${!halfRunning ? 'opacity: 0.5; cursor: not-allowed;' : ''}"
                      ${!halfRunning ? 'disabled' : ''}>
                      ${isOnField ? 'Sub Out' : 'Sub In'}
                    </button>
                  </div>
                `;
              }).join('')}
            </div>
          </div>

          ${game.goals?.length > 0 ? `
            <div class="card">
              <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Goals (${game.goals.length})</h2>
              ${game.goals.map((goal, idx) => {
                const player = state.players.find(p => p.id === goal.player_id);
                return `
                  <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem;
                    background: rgba(16, 185, 129, 0.1); border-radius: 0.5rem; margin-bottom: 0.5rem;">
                    <div>
                      <div style="font-weight: 600;">${player?.name || 'Unknown'}</div>
                      <div style="font-size: 0.875rem; color: #94a3b8;">${goal.minute}'</div>
                    </div>
                    <button onclick="removeGoal(${idx})" class="btn-secondary" style="padding: 0.5rem;">×</button>
                  </div>
                `;
              }).join('')}
            </div>
          ` : ''}
        </div>
      `;
    }

    function renderApp() {
      const views = state.user?.role === 'coach'
        ? ['dashboard', 'live', 'history', 'roster', 'lineup', 'settings']
        : ['dashboard', 'history', 'roster'];

      return `
        <div class="container">
          <div class="nav">
            <div style="flex: 1; font-weight: 700; font-size: 1.25rem;">⚽ ${state.team.name}</div>
            ${views.map(v => `
              <button onclick="setView('${v}')" class="nav-btn ${state.view === v ? 'active' : ''}">
                ${v.charAt(0).toUpperCase() + v.slice(1)}
              </button>
            `).join('')}
            <button onclick="logout()" class="nav-btn">Sign Out</button>
          </div>
        </div>

        <div id="view-content">
          ${state.view === 'dashboard' ? renderDashboard() :
            state.view === 'live' ? renderLiveGame() :
            state.view === 'history' ? renderHistory() :
            state.view === 'roster' ? renderRoster() :
            state.view === 'lineup' ? renderLineup() :
            state.view === 'settings' ? renderSettings() : ''}
        </div>
      `;
    }

    // Event handlers
    window.switchTab = function(tab) {
      const loginBtn = document.getElementById('tab-login');
      const createBtn = document.getElementById('tab-create');
      const loginForm = document.getElementById('login-form');
      const createForm = document.getElementById('create-form');

      if (tab === 'login') {
        loginBtn.classList.add('active');
        createBtn.classList.remove('active');
        loginForm.classList.remove('hidden');
        createForm.classList.add('hidden');
      } else {
        loginBtn.classList.remove('active');
        createBtn.classList.add('active');
        loginForm.classList.add('hidden');
        createForm.classList.remove('hidden');
      }
    };

    window.doLogin = async function() {
      const team = document.getElementById('l-team').value.trim();
      const pass = document.getElementById('l-pass').value;
      const role = document.getElementById('l-role').value;
      const errEl = document.getElementById('login-error');

      if (!team || !pass) {
        errEl.textContent = 'Please fill in all fields';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        await handleLogin(team, pass, role);
      } catch (error) {
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
      }
    };

    window.doCreate = async function() {
      const name = document.getElementById('c-name').value.trim();
      const coach = document.getElementById('c-coach').value;
      const player = document.getElementById('c-player').value;
      const errEl = document.getElementById('create-error');

      if (!name || !coach) {
        errEl.textContent = 'Team name and coach password required';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        await handleCreateTeam(name, coach, player);
        errEl.className = 'success';
        errEl.textContent = 'Team created! Please sign in.';
        errEl.classList.remove('hidden');
        setTimeout(() => switchTab('login'), 1500);
      } catch (error) {
        errEl.className = 'error';
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
      }
    };

    window.setView = function(view) {
      state.view = view;
      render();
    };

    window.logout = function() {
      state = {
        user: null,
        team: null,
        players: [],
        games: [],
        view: 'login'
      };
      render();
    };

    window.showAddPlayer = function() {
      const form = document.getElementById('add-player-form');
      form.classList.toggle('hidden');
    };

    window.addPlayer = async function() {
      const name = document.getElementById('np-name').value.trim();
      if (!name) return;

      const photoInput = document.getElementById('np-photo');
      let photoData = null;

      // Convert photo to base64 if provided
      if (photoInput.files && photoInput.files[0]) {
        const file = photoInput.files[0];
        photoData = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.readAsDataURL(file);
        });
      }

      const { data, error } = await sb
        .from('players')
        .insert({
          team_id: state.team.id,
          name,
          photo: photoData
        })
        .select()
        .single();

      if (error) {
        alert('Error adding player: ' + error.message);
        return;
      }

      state.players.push(data);
      document.getElementById('np-name').value = '';
      document.getElementById('np-photo').value = '';
      render();
    };

    window.removePlayer = async function(id) {
      if (!confirm('Remove this player?')) return;

      await sb.from('players').delete().eq('id', id);
      state.players = state.players.filter(p => p.id !== id);
      render();
    };

    window.showAddGame = function() {
      const form = document.getElementById('add-game-form');
      form.classList.toggle('hidden');
    };

    window.createGame = async function() {
      const opponent = document.getElementById('ng-opponent').value.trim();
      const date = document.getElementById('ng-date').value;
      const time = document.getElementById('ng-time').value;
      const venue = document.getElementById('ng-venue').value.trim();

      if (!opponent || !date || !time || !venue) {
        alert('Please fill in all fields');
        return;
      }

      const { data, error } = await sb
        .from('games')
        .insert({
          team_id: state.team.id,
          opponent,
          date,
          time,
          venue,
          home_score: 0,
          away_score: 0,
          finished: false,
          half: 0,
          half_started_at: null,
          player_times: {},
          player_on_field: {},
          goals: [],
          film_link: ''
        })
        .select()
        .single();

      if (error) {
        alert('Error creating game: ' + error.message);
        return;
      }

      state.games.push(data);
      document.getElementById('ng-opponent').value = '';
      document.getElementById('ng-date').value = '';
      document.getElementById('ng-time').value = '';
      document.getElementById('ng-venue').value = '';
      document.getElementById('add-game-form').classList.add('hidden');
      render();
    };

    // Live game functions
    window.startGame = function(gameId) {
      const game = state.games.find(g => g.id === gameId);
      if (!game) return;

      state.activeGame = game;
      state.view = 'live';
      render();
    };

    window.endGame = async function() {
      if (!confirm('End this game? This will mark it as finished.')) return;

      // Stop timer
      if (state.timerInterval) {
        clearInterval(state.timerInterval);
        state.timerInterval = null;
      }

      // Update game as finished
      const updates = {
        finished: true,
        half_started_at: null
      };

      await sb.from('games').update(updates).eq('id', state.activeGame.id);
      Object.assign(state.activeGame, updates);

      // Reload games
      await loadData();
      state.activeGame = null;
      state.view = 'history';
      render();
    };

    window.startHalf = async function(half) {
      const now = Date.now();
      const updates = {
        half,
        half_started_at: now
      };

      await sb.from('games').update(updates).eq('id', state.activeGame.id);
      Object.assign(state.activeGame, updates);

      // Start timer
      startTimer();
      render();
    };

    window.endHalf = async function() {
      // Calculate and save player times
      const game = state.activeGame;
      const elapsed = Date.now() - game.half_started_at;

      const updatedTimes = { ...game.player_times };
      for (const [playerId, isOn] of Object.entries(game.player_on_field || {})) {
        if (isOn) {
          updatedTimes[playerId] = (updatedTimes[playerId] || 0) + elapsed;
        }
      }

      const updates = {
        half_started_at: null,
        player_times: updatedTimes
      };

      await sb.from('games').update(updates).eq('id', state.activeGame.id);
      Object.assign(state.activeGame, updates);

      // Stop timer
      if (state.timerInterval) {
        clearInterval(state.timerInterval);
        state.timerInterval = null;
      }

      render();
    };

    window.adjustScore = async function(delta) {
      const game = state.activeGame;
      const newScore = Math.max(0, game.home_score + delta);

      await sb.from('games').update({ home_score: newScore }).eq('id', game.id);
      game.home_score = newScore;
      render();
    };

    window.showGoalScorer = function() {
      document.getElementById('goal-scorer-modal').classList.remove('hidden');
    };

    window.hideGoalScorer = function() {
      document.getElementById('goal-scorer-modal').classList.add('hidden');
    };

    window.addGoal = async function(playerId) {
      const game = state.activeGame;
      const elapsed = game.half_started_at ? Date.now() - game.half_started_at : 0;
      const totalTime = Object.values(game.player_times || {}).reduce((a, b) => a + b, 0) + elapsed;
      const minute = Math.floor(totalTime / 60000);

      const goals = [...(game.goals || []), { player_id: playerId, minute }];
      const newScore = game.home_score + 1;

      await sb.from('games').update({ home_score: newScore, goals }).eq('id', game.id);
      game.home_score = newScore;
      game.goals = goals;

      hideGoalScorer();
      render();
    };

    window.togglePlayer = async function(playerId) {
      const game = state.activeGame;
      if (!game.half_started_at) return;

      const isCurrentlyOn = game.player_on_field?.[playerId] || false;
      const updatedOnField = { ...game.player_on_field, [playerId]: !isCurrentlyOn };

      await sb.from('games').update({ player_on_field: updatedOnField }).eq('id', game.id);
      game.player_on_field = updatedOnField;

      render();
    };

    window.updateFilmLink = async function(link) {
      await sb.from('games').update({ film_link: link }).eq('id', state.activeGame.id);
      state.activeGame.film_link = link;
    };

    window.removeGoal = async function(index) {
      const game = state.activeGame;
      const goals = [...game.goals];
      goals.splice(index, 1);

      const newScore = Math.max(0, game.home_score - 1);
      await sb.from('games').update({ goals, home_score: newScore }).eq('id', game.id);
      game.goals = goals;
      game.home_score = newScore;

      render();
    };

    function startTimer() {
      if (state.timerInterval) {
        clearInterval(state.timerInterval);
      }

      state.timerInterval = setInterval(() => {
        if (!state.activeGame || !state.activeGame.half_started_at) {
          clearInterval(state.timerInterval);
          state.timerInterval = null;
          return;
        }

        // Update all player timers
        const game = state.activeGame;
        const elapsed = Date.now() - game.half_started_at;

        for (const player of state.players) {
          const isOnField = game.player_on_field?.[player.id] || false;
          const totalTime = game.player_times?.[player.id] || 0;
          const currentTime = isOnField ? elapsed : 0;
          const displayTime = totalTime + currentTime;

          const timerEl = document.getElementById(`timer-${player.id}`);
          if (timerEl) {
            timerEl.textContent = formatTime(displayTime);
          }
        }
      }, 1000);
    }

    // Lineup functions
    let selectedPosition = null;

    window.changeFormation = async function(index) {
      await sb.from('teams').update({ active_formation: parseInt(index) }).eq('id', state.team.id);
      state.team.active_formation = parseInt(index);
      render();
    };

    window.assignPosition = function(posId) {
      selectedPosition = posId;
      const formations = state.team.formations || [];
      const activeFormation = formations[state.team.active_formation || 0];
      const pos = activeFormation.positions.find(p => p.id === posId);

      document.getElementById('pos-label').textContent = pos.label;
      document.getElementById('assign-player').classList.remove('hidden');

      // Set current player if assigned
      const currentPlayer = state.team.lineup?.[posId];
      if (currentPlayer) {
        document.getElementById('player-select').value = currentPlayer;
      }
    };

    window.savePosition = async function() {
      const playerId = document.getElementById('player-select').value;
      const updatedLineup = { ...state.team.lineup };

      if (playerId) {
        updatedLineup[selectedPosition] = playerId;
      } else {
        delete updatedLineup[selectedPosition];
      }

      await sb.from('teams').update({ lineup: updatedLineup }).eq('id', state.team.id);
      state.team.lineup = updatedLineup;

      document.getElementById('assign-player').classList.add('hidden');
      selectedPosition = null;
      render();
    };

    // Settings functions
    window.toggleLeaderboard = async function(checked) {
      await sb.from('teams').update({ leaderboard_public: checked }).eq('id', state.team.id);
      state.team.leaderboard_public = checked;
    };

    window.updatePasswords = async function() {
      const coachPass = document.getElementById('new-coach-pass').value;
      const playerPass = document.getElementById('new-player-pass').value;

      if (!coachPass) {
        alert('Coach password is required');
        return;
      }

      const updates = { coach_pass: coachPass };
      if (playerPass) {
        updates.player_pass = playerPass;
      }

      await sb.from('teams').update(updates).eq('id', state.team.id);
      Object.assign(state.team, updates);

      alert('Passwords updated successfully');
      document.getElementById('new-coach-pass').value = '';
      document.getElementById('new-player-pass').value = '';
    };

    window.deleteTeam = async function() {
      if (!confirm('Are you sure you want to delete this team? This cannot be undone.')) return;
      if (!confirm('This will permanently delete all players, games, and data. Continue?')) return;

      await sb.from('teams').delete().eq('id', state.team.id);
      logout();
    };

    // Main render
    function render() {
      console.log('Rendering, state.view:', state.view);
      const app = document.getElementById('app');

      if (!state.user || !state.team) {
        app.innerHTML = renderLogin();
      } else {
        app.innerHTML = renderApp();
      }
    }

    // Initialize
    console.log('Initializing app...');
    render();
  </script>
</body>
</html>
